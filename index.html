<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就業支援ポータル</title>
    
    <!-- Tailwind CSS (Styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; opacity: 0; transform: translateY(10px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, sendEmailVerification, multiFactor, PhoneAuthProvider, PhoneMultiFactorGenerator, RecaptchaVerifier, getMultiFactorResolver } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDHqkBNSSsakVwHxKdWZ4hNoSM9wORbLR4",
            authDomain: "health-support-portal.firebaseapp.com",
            projectId: "health-support-portal",
            storageBucket: "health-support-portal.firebasestorage.app",
            messagingSenderId: "71602892006",
            appId: "1:71602892006:web:c99fe5343191e65a2fdf27"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        auth.languageCode = 'ja';

        const { useState, useEffect } = React;

        const ROLES = [
            { id: 'admin', label: 'システム管理者', icon: 'fa-lock' },
            { id: 'employee', label: '従業員 (本人)', icon: 'fa-user' },
            { id: 'manager', label: '職制 (上司)', icon: 'fa-briefcase' },
            { id: 'ohp', label: '保健師', icon: 'fa-heart-pulse' }
        ];

        const PHASES = [
            { id: 0, title: '発症報告' },
            { id: 1, title: 'ガイドライン判定' },
            { id: 2, title: 'Phase Ⅰ(療養)' },
            { id: 3, title: 'Phase Ⅱ(準備)' },
            { id: 4, title: 'Phase Ⅲ(就労)' }
        ];

        const MASTER_ADMIN_EMAIL = 'yuuto.kanamori.ma@mcgc.com';

        function HealthSupportPortal() {
            // --- Core App States ---
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [isDemoMode, setIsDemoMode] = useState(false);
            const [currentRole, setCurrentRole] = useState('');
            const [currentUser, setCurrentUser] = useState(null);
            
            const [currentView, setCurrentView] = useState('detail'); 
            const [currentPhase, setCurrentPhase] = useState(0);
            const [formData, setFormData] = useState({});
            const [cases, setCases] = useState([]); 

            // --- Auth & MFA States ---
            const [authStep, setAuthStep] = useState('email_password'); 
            const [isLoginMode, setIsLoginMode] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [phone, setPhone] = useState('');
            const [verificationCode, setVerificationCode] = useState('');
            const [verificationId, setVerificationId] = useState('');
            const [resolver, setResolver] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (user) => {
                    if (user && !isDemoMode) {
                        const enrolledFactors = multiFactor(user).enrolledFactors;
                        // ログインを許可する条件：MFA登録済み、またはマスター管理者
                        if (enrolledFactors.length > 0 || user.email === MASTER_ADMIN_EMAIL) {
                            try {
                                const docRef = doc(db, "users", user.uid);
                                const docSnap = await getDoc(docRef);
                                if (docSnap.exists()) {
                                    let userData = docSnap.data();
                                    setCurrentUser(user);
                                    setCurrentRole(userData.role);
                                    setIsLoggedIn(true);
                                    setCurrentView(userData.role === 'employee' ? 'detail' : 'dashboard');
                                }
                            } catch (error) {
                                console.error("Session Restore Error:", error);
                            }
                        }
                    }
                });
                return () => unsubscribe();
            }, [isDemoMode]);

            useEffect(() => {
                if (!isLoggedIn || isDemoMode) return;
                const unsubscribe = onSnapshot(collection(db, "cases"), (snapshot) => {
                    const casesData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setCases(casesData);
                });
                return () => unsubscribe();
            }, [isLoggedIn, isDemoMode]);

            const executeAuth = async () => {
                setErrorMsg('');
                setIsLoading(true);
                try {
                    if (isLoginMode) {
                        const userCredential = await signInWithEmailAndPassword(auth, email, password);
                        setCurrentUser(userCredential.user);
                        const docSnap = await getDoc(doc(db, "users", userCredential.user.uid));
                        const userData = docSnap.exists() ? docSnap.data() : { role: 'employee' };
                        setCurrentRole(userData.role);

                        if (userCredential.user.email === MASTER_ADMIN_EMAIL) {
                            setIsLoggedIn(true);
                            setCurrentView('dashboard');
                        } else {
                            setAuthStep('mfa_setup');
                        }
                    } else {
                        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                        setCurrentUser(userCredential.user);
                        await setDoc(doc(db, "users", userCredential.user.uid), {
                            email: email, role: 'employee', createdAt: new Date()
                        });
                        await sendEmailVerification(userCredential.user);
                        setAuthStep('email_verification');
                    }
                } catch (error) {
                    console.error("Auth Error", error);
                    if (error.code === 'auth/multi-factor-auth-required') {
                        setResolver(getMultiFactorResolver(auth, error));
                        setAuthStep('mfa_verify');
                    } else if (error.code === 'auth/email-already-in-use') {
                        setErrorMsg('このメールアドレスは既に登録されています。ログイン画面に切り替えてください。');
                    } else {
                        setErrorMsg('認証に失敗しました。メールアドレスとパスワードを確認してください。');
                    }
                }
                setIsLoading(false);
            };

            const checkEmailVerified = async () => {
                if (!currentUser) return;
                await currentUser.reload();
                if (currentUser.emailVerified) {
                    setAuthStep('mfa_setup');
                    setErrorMsg('');
                } else {
                    setErrorMsg('まだ確認が完了していません。メール内のリンクをクリックしてください。');
                }
            };

            const setupRecaptcha = () => {
                if (!window.recaptchaVerifier) {
                    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'invisible' });
                }
                return window.recaptchaVerifier;
            };

            const handleSendSMS = async () => {
                setErrorMsg('');
                setIsLoading(true);
                try {
                    const verifier = setupRecaptcha();
                    let formattedPhone = phone.replace(/-/g, '');
                    if (formattedPhone.startsWith('0')) {
                        formattedPhone = '+81' + formattedPhone.slice(1);
                    }

                    if (authStep === 'mfa_setup') {
                        const multiFactorSession = await multiFactor(currentUser).getSession();
                        const phoneInfoOptions = { phoneNumber: formattedPhone, session: multiFactorSession };
                        const phoneAuthProvider = new PhoneAuthProvider(auth);
                        const verId = await phoneAuthProvider.verifyPhoneNumber(phoneInfoOptions, verifier);
                        setVerificationId(verId);
                        setAuthStep('mfa_confirm_setup');
                    } else if (authStep === 'mfa_verify') {
                        const phoneInfoOptions = { multiFactorHint: resolver.hints[0], session: resolver.session };
                        const phoneAuthProvider = new PhoneAuthProvider(auth);
                        const verId = await phoneAuthProvider.verifyPhoneNumber(phoneInfoOptions, verifier);
                        setVerificationId(verId);
                        setAuthStep('mfa_confirm_verify');
                    }
                } catch (error) {
                    console.error("MFA Send Error", error);
                    if (window.recaptchaVerifier) {
                        window.recaptchaVerifier.clear();
                        window.recaptchaVerifier = null;
                    }
                    setErrorMsg('SMSの送信に失敗しました。番号を確認するか、時間をおいてお試しください。');
                }
                setIsLoading(false);
            };

            const handleVerifyCode = async () => {
                setErrorMsg('');
                setIsLoading(true);
                try {
                    const cred = PhoneAuthProvider.credential(verificationId, verificationCode);
                    const multiFactorAssertion = PhoneMultiFactorGenerator.assertion(cred);

                    if (authStep === 'mfa_confirm_setup') {
                        await multiFactor(currentUser).enroll(multiFactorAssertion, "Personal Phone");
                        setIsLoggedIn(true);
                        setCurrentView('detail');
                        setFormData({ id: `emp_${Date.now()}` });
                        setCurrentPhase(0);
                    } else if (authStep === 'mfa_confirm_verify') {
                        const userCredential = await resolver.resolveSignIn(multiFactorAssertion);
                        setCurrentUser(userCredential.user);
                        const docSnap = await getDoc(doc(db, "users", userCredential.user.uid));
                        if (docSnap.exists()) {
                            setCurrentRole(docSnap.data().role);
                            setIsLoggedIn(true);
                            setCurrentView(docSnap.data().role === 'employee' ? 'detail' : 'dashboard');
                        }
                    }
                } catch (error) {
                    console.error("MFA Verify Error", error);
                    setErrorMsg('認証コードが正しくありません。');
                }
                setIsLoading(false);
            };

            const enterDemoMode = (roleId) => {
                setIsDemoMode(true);
                setCurrentRole(roleId);
                setCurrentUser({ uid: `demo_${roleId}`, name: `テスト・${ROLES.find(r=>r.id===roleId).label}`, email: 'demo@example.com' });
                setIsLoggedIn(true);
                
                if (roleId === 'employee') {
                    setCurrentView('detail');
                    setFormData({ id: 'demo_case_1', uid: 'demo_employee', empId: '99999', name: 'テスト・従業員', department: 'テスト部', phase: 0 });
                    setCurrentPhase(0);
                } else {
                    setCurrentView('dashboard');
                    setCases([
                        { id: 'demo_case_1', empId: '99999', name: 'テスト・従業員', department: 'テスト部', phase: 1, need_ohp: 'yes' },
                        { id: 'demo_case_2', empId: '88888', name: '佐藤 花子', department: '開発部', phase: 3, report_health: '少しずつ良くなっています。' }
                    ]);
                }
            };

            const saveData = async (extraData = {}) => {
                const newData = { ...formData, ...extraData };
                setFormData(newData);
                if (extraData.phase !== undefined) setCurrentPhase(extraData.phase);

                if (isDemoMode) return; 

                try {
                    const saveId = newData.id || `case_${Date.now()}`;
                    if (!newData.id) newData.id = saveId;
                    await setDoc(doc(db, "cases", saveId), newData, { merge: true });
                } catch (error) {
                    console.error("保存エラー:", error);
                }
            };

            const handleLogout = () => {
                signOut(auth).then(() => {
                    setIsLoggedIn(false);
                    setIsDemoMode(false);
                    setCurrentUser(null);
                    setAuthStep('email_password');
                    setFormData({});
                });
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100">
                            <div className="text-center mb-8">
                                <div className="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-4">
                                    <i className="fa-solid fa-shield-halved text-3xl text-blue-600"></i>
                                </div>
                                <h1 className="text-2xl font-bold text-slate-800">就業支援ポータル</h1>
                                <p className="text-blue-600 text-xs font-bold mt-2 bg-blue-50 py-1 px-3 rounded-full inline-block">セキュリティ対策（MFA）</p>
                            </div>

                            {/* Email & Password Form */}
                            {authStep === 'email_password' && (
                                <div className="space-y-4 animate-fade-in-up">
                                    {errorMsg && <div className="p-3 bg-red-50 text-red-600 text-sm rounded-md border border-red-200">{errorMsg}</div>}
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">メールアドレス</label>
                                        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-3 border border-slate-300 rounded-md bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="example@mcgc.com"/>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">パスワード</label>
                                        <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-3 border border-slate-300 rounded-md bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="6文字以上"/>
                                    </div>
                                    <button onClick={executeAuth} disabled={isLoading} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md shadow-md transition-colors mt-4">
                                        {isLoading ? '処理中...' : (isLoginMode ? 'ログイン' : 'アカウントを作成')}
                                    </button>
                                    <div className="text-center mt-4">
                                        <button onClick={() => {setIsLoginMode(!isLoginMode); setErrorMsg('');}} className="text-sm text-blue-600 hover:underline font-medium">
                                            {isLoginMode ? 'はじめての方はこちら（新規登録）' : 'すでにアカウントをお持ちの方（ログイン）'}
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* Email Verification Step */}
                            {authStep === 'email_verification' && (
                                <div className="space-y-6 text-center animate-fade-in-up">
                                    <i className="fa-solid fa-envelope-open-text text-5xl text-blue-400"></i>
                                    <div>
                                        <h3 className="font-bold text-lg text-slate-800">メールアドレスの確認</h3>
                                        <p className="text-sm text-slate-600 mt-2"><b>{email}</b> 宛に確認リンクを送信しました。メール内のリンクをクリックしてから、下のボタンを押してください。</p>
                                    </div>
                                    {errorMsg && <div className="p-3 bg-red-50 text-red-600 text-sm rounded-md">{errorMsg}</div>}
                                    <button onClick={checkEmailVerified} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md shadow-md">メールのリンクをクリックした後に押す</button>
                                </div>
                            )}

                            {/* MFA Phone Input Step */}
                            {(authStep === 'mfa_setup' || authStep === 'mfa_verify') && (
                                <div className="space-y-4 animate-fade-in-up">
                                    <div className="bg-indigo-50 p-4 rounded-lg border border-indigo-100">
                                        <h3 className="text-sm font-bold text-indigo-900 flex items-center gap-2 mb-2"><i className="fa-solid fa-mobile-screen"></i> SMS認証 (多要素)</h3>
                                        <p className="text-xs text-indigo-700">セキュリティ保護のため、携帯電話番号を入力してください。（※テスト用は 09000000000 を入力）</p>
                                    </div>
                                    {errorMsg && <div className="p-3 bg-red-50 text-red-600 text-sm rounded-md">{errorMsg}</div>}
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">携帯電話番号 (ハイフンなし)</label>
                                        <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} className="w-full p-3 border border-slate-300 rounded-md" placeholder="例: 09012345678"/>
                                    </div>
                                    <div id="recaptcha-container"></div>
                                    <button onClick={handleSendSMS} disabled={isLoading} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md shadow-md">
                                        {isLoading ? '処理中...' : 'SMSに認証コードを送信'}
                                    </button>
                                </div>
                            )}

                            {/* MFA Code Verify Step */}
                            {(authStep === 'mfa_confirm_setup' || authStep === 'mfa_confirm_verify') && (
                                <div className="space-y-4 animate-fade-in-up">
                                    <div className="text-center mb-6">
                                        <i className="fa-solid fa-message text-4xl text-blue-500 mb-2"></i>
                                        <p className="text-sm text-slate-600">SMSで届いた6桁の認証コードを入力してください。</p>
                                    </div>
                                    {errorMsg && <div className="p-3 bg-red-50 text-red-600 text-sm rounded-md">{errorMsg}</div>}
                                    <input type="text" value={verificationCode} onChange={e=>setVerificationCode(e.target.value)} className="w-full p-3 border border-slate-300 rounded-md text-center text-xl tracking-widest font-bold" placeholder="123456" maxLength="6"/>
                                    <button onClick={handleVerifyCode} disabled={isLoading} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md shadow-md">
                                        {isLoading ? '認証中...' : '認証して完了'}
                                    </button>
                                </div>
                            )}

                            {/* Demo Mode Bypass (For UI Testing) */}
                            {authStep === 'email_password' && (
                                <div className="mt-8 pt-6 border-t border-slate-200 animate-fade-in-up">
                                    <div className="bg-slate-100 p-4 rounded-xl border border-slate-200">
                                        <h3 className="text-xs font-black text-slate-500 mb-3 flex items-center justify-center gap-1">
                                            <i className="fa-solid fa-circle-info"></i> 【開発用】認証をスキップして画面を確認
                                        </h3>
                                        <div className="grid grid-cols-2 gap-2">
                                            {ROLES.map(role => (
                                                <button key={`demo_${role.id}`} onClick={() => enterDemoMode(role.id)} className="flex flex-col items-center p-3 bg-white border border-slate-300 rounded-lg hover:border-blue-500 hover:bg-blue-50 shadow-sm group">
                                                    <i className={`fa-solid ${role.icon} text-slate-400 group-hover:text-blue-600 mb-1 text-lg`}></i>
                                                    <span className="text-[10px] font-bold text-slate-600 group-hover:text-blue-700">{role.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            const roleInfo = ROLES.find(r => r.id === currentRole) || ROLES[1];

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-blue-900 text-white shadow-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center flex-wrap gap-4">
                            <div className="flex items-center gap-2">
                                <i className="fa-solid fa-heart-pulse text-xl text-red-400"></i>
                                <h1 className="text-lg font-bold tracking-wider">就業支援ポータル</h1>
                                {isDemoMode && <span className="bg-yellow-400 text-yellow-900 text-[10px] px-2 py-0.5 rounded-full font-black">デモモード</span>}
                            </div>
                            <div className="flex items-center gap-4 text-sm bg-blue-800 py-1 px-3 rounded-lg border border-blue-700">
                                <div className="flex items-center gap-2 text-blue-100 pr-4 border-r border-blue-700">
                                    <i className={`fa-solid ${roleInfo.icon}`}></i>
                                    <span className="font-bold">{roleInfo.label}</span>
                                </div>
                                <button onClick={handleLogout} className="flex items-center gap-1 text-white hover:text-red-300 transition-colors">
                                    <i className="fa-solid fa-right-from-bracket"></i> ログアウト
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-8">
                        {currentView === 'dashboard' ? (
                            <div className="animate-fade-in-up">
                                <h2 className="text-2xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                                    <i className="fa-solid fa-briefcase text-blue-600"></i> 対応中の従業員一覧
                                </h2>
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    {cases.length === 0 ? (
                                        <div className="p-12 text-center text-slate-500">データがありません。</div>
                                    ) : (
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 border-b border-slate-200">
                                                <tr>
                                                    <th className="p-4 font-bold text-slate-700">社員番号</th>
                                                    <th className="p-4 font-bold text-slate-700">氏名</th>
                                                    <th className="p-4 font-bold text-slate-700">ステータス</th>
                                                    <th className="p-4 font-bold text-slate-700 text-center">アクション</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {cases.map(c => (
                                                    <tr key={c.id} className="hover:bg-blue-50 transition-colors">
                                                        <td className="p-4 text-slate-600">{c.empId || '-'}</td>
                                                        <td className="p-4 font-bold text-slate-800">{c.name || '-'}</td>
                                                        <td className="p-4">
                                                            <span className="bg-blue-100 text-blue-800 text-xs px-3 py-1 rounded-full font-bold">
                                                                {c.phase === 5 ? '完了' : PHASES[c.phase || 0]?.title}
                                                            </span>
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            <button onClick={() => { setFormData(c); setCurrentPhase(c.phase||0); setCurrentView('detail'); }} className="bg-white border border-blue-600 text-blue-600 hover:bg-blue-600 hover:text-white px-4 py-1.5 rounded-md text-sm font-bold transition-colors shadow-sm">
                                                                詳細を開く
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="animate-fade-in-up">
                                <div className="bg-white px-6 py-4 rounded-xl shadow-sm border border-slate-200 mb-8 flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-blue-100 p-3 rounded-full hidden sm:block"><i className="fa-solid fa-user text-blue-600 text-xl"></i></div>
                                        <div>
                                            <div className="flex flex-wrap items-center gap-2 mb-1">
                                                <span className="text-sm text-slate-500 font-medium">社員番号: {formData.empId || '未入力'}</span>
                                            </div>
                                            <h2 className="text-xl font-bold text-slate-800">{formData.name || '氏名未設定 (新規申請)'}</h2>
                                        </div>
                                    </div>
                                    {currentRole !== 'employee' && (
                                        <button onClick={() => setCurrentView('dashboard')} className="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-bold flex items-center gap-1"><i className="fa-solid fa-chevron-left"></i> 戻る</button>
                                    )}
                                </div>

                                {/* Phase Indicator */}
                                <div className="mb-10">
                                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><i className="fa-solid fa-clock text-slate-500"></i> 現在のステータス: {currentPhase === 5 ? '完了' : PHASES[currentPhase]?.title}</h2>
                                    <div className="relative pt-1">
                                        <div className="overflow-hidden h-2 mb-4 text-xs flex rounded bg-slate-200">
                                            <div style={{ width: `${(currentPhase / 5) * 100}%` }} className="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-blue-500 transition-all duration-500"></div>
                                        </div>
                                        <div className="flex justify-between text-xs font-medium text-slate-500 px-1">
                                            {PHASES.map(p => (<div key={p.id} className={currentPhase >= p.id ? 'text-blue-600 font-bold' : ''}>{p.title}</div>))}
                                            <div className={currentPhase === 5 ? 'text-blue-600 font-bold' : ''}>完了</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Phase 0: 発症報告 */}
                                {currentPhase === 0 && (
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 animate-fade-in-up">
                                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2 border-b pb-3"><i className="fa-solid fa-file-lines text-blue-600"></i> 発症報告</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                            <div><label className="block text-sm font-medium mb-1">氏名</label><input type="text" value={formData.name||''} onChange={e=>setFormData({...formData, name: e.target.value})} className="w-full p-2 border rounded-md bg-slate-50"/></div>
                                            <div><label className="block text-sm font-medium mb-1">社員番号</label><input type="text" value={formData.empId||''} onChange={e=>setFormData({...formData, empId: e.target.value})} className="w-full p-2 border rounded-md bg-slate-50"/></div>
                                        </div>
                                        <div className="mb-8"><label className="block text-sm font-medium mb-1">現在の主な症状</label><input type="text" value={formData.symptom||''} onChange={e=>setFormData({...formData, symptom: e.target.value})} className="w-full p-2 border rounded-md bg-slate-50"/></div>
                                        
                                        <div className="flex justify-center"><button onClick={() => saveData({phase: 1})} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full flex items-center gap-2">送信して次へ <i className="fa-solid fa-chevron-right"></i></button></div>
                                    </div>
                                )}

                                {/* Phase 1: ガイドライン判定 */}
                                {currentPhase === 1 && (
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 animate-fade-in-up">
                                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2 border-b pb-3"><i className="fa-solid fa-shield-halved text-indigo-600"></i> 判定フロー</h2>
                                        {currentRole === 'employee' ? (
                                            <div className="text-center p-12 bg-indigo-50 rounded-xl"><i className="fa-solid fa-clock text-4xl text-indigo-300 mb-4"></i><h3 className="font-bold text-indigo-800">職制・保健師による判定中</h3></div>
                                        ) : (
                                            <div className="space-y-6">
                                                <div className="p-5 border border-indigo-200 rounded-lg">
                                                    <h3 className="font-bold mb-3"><span className="bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded text-sm mr-2">職制</span>保健師への相談は必要ですか？</h3>
                                                    <label className="mr-4"><input type="radio" checked={formData.need_ohp==='yes'} onChange={()=>setFormData({...formData, need_ohp:'yes'})} className="mr-1"/>要</label>
                                                    <label><input type="radio" checked={formData.need_ohp==='no'} onChange={()=>setFormData({...formData, need_ohp:'no'})} className="mr-1"/>不要</label>
                                                </div>
                                                <div className="flex justify-between mt-6">
                                                    <button onClick={()=>saveData({})} className="px-6 py-2 border rounded-md">途中保存</button>
                                                    <button onClick={()=>saveData({phase: formData.need_ohp==='yes'?2:5})} className="bg-blue-600 text-white px-6 py-2 rounded-md font-bold">判定を確定して進む</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* Phase 2, 3, 4, 5 Simplified for Code Structure, keeping core visuals */}
                                {currentPhase >= 2 && currentPhase <= 4 && (
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 animate-fade-in-up text-center">
                                        <i className="fa-solid fa-file-lines text-5xl text-blue-300 mb-4"></i>
                                        <h2 className="text-2xl font-bold mb-4">{PHASES[currentPhase].title} 進行中</h2>
                                        <p className="text-slate-600 mb-8">各フェーズでの書類提出、面談、セルフチェックを実施します。</p>
                                        <div className="flex justify-center gap-4">
                                            <button onClick={()=>saveData({phase: currentPhase - 1})} className="bg-slate-200 text-slate-700 px-6 py-2 rounded-md font-bold">前へ戻る</button>
                                            <button onClick={()=>saveData({phase: currentPhase + 1})} className="bg-blue-600 text-white px-6 py-2 rounded-md font-bold">次フェーズへ進む</button>
                                        </div>
                                    </div>
                                )}

                                {currentPhase === 5 && (
                                    <div className="bg-white p-12 rounded-xl shadow-sm border border-slate-200 text-center animate-fade-in-up">
                                        <i className="fa-solid fa-circle-check text-6xl text-green-500 mb-4"></i>
                                        <h2 className="text-2xl font-bold text-slate-800 mb-4">就業支援プログラム 完了</h2>
                                        <p className="text-slate-600 mb-8">通常業務への復帰が確認されました。</p>
                                        <button onClick={() => setCurrentView('dashboard')} className="bg-slate-100 text-slate-700 font-bold py-2 px-6 rounded-md shadow-sm">一覧へ戻る</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HealthSupportPortal />);
    </script>
</body>
</html>
