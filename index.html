<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私傷病・就業支援ポータル</title>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.294.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
        }
    }
    </script>

    <style>
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Upload, FileText, CheckCircle, Clock, ChevronRight, ChevronLeft, User, Users, Briefcase, HeartPulse, Shield, LogOut, Lock, Check, Activity, AlertTriangle, Info, RotateCcw, Trash2, Smartphone } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile,
            multiFactor, PhoneAuthProvider, PhoneMultiFactorGenerator, RecaptchaVerifier, getMultiFactorResolver
        } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, deleteDoc } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyDHqkBNSSsakVwHxKdWZ4hNoSM9wORbLR4",
            authDomain: "health-support-portal.firebaseapp.com",
            projectId: "health-support-portal",
            storageBucket: "health-support-portal.firebasestorage.app",
            messagingSenderId: "71602892006",
            appId: "1:71602892006:web:c99fe5343191e65a2fdf27",
            measurementId: "G-FED2KDFGJ7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ROLES = [
            { id: 'admin', label: 'システム管理者', icon: Lock },
            { id: 'employee', label: '従業員 (本人)', icon: User },
            { id: 'manager', label: '職制 (上司)', icon: Briefcase },
            { id: 'ohp', label: '保健師', icon: HeartPulse }
        ];

        const PHASES = [
            { id: 0, title: '発生報告', desc: '基本情報' },
            { id: 1, title: '職制確認', desc: '上司評価' },
            { id: 2, title: '自動判定', desc: '専門職確認' },
            { id: 3, title: '就業支援PG', desc: '療養〜復帰' },
            { id: 4, title: '完了', desc: '通常復帰' }
        ];

        const MASTER_ADMIN_EMAIL = "yuuto.kanamori.ma@mcgc.com";

        function HealthSupportPortal() {
            // App States
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentRole, setCurrentRole] = useState('');
            const [currentUser, setCurrentUser] = useState(null);
            
            const [currentView, setCurrentView] = useState('detail'); 
            const [currentPhase, setCurrentPhase] = useState(0);
            const [formData, setFormData] = useState({});
            const [cases, setCases] = useState([]); 

            // Auth & MFA States
            const [authMode, setAuthMode] = useState('login'); 
            const [authStep, setAuthStep] = useState('email_password'); 
            const [authData, setAuthData] = useState({ email: '', password: '', empId: '', name: '' });
            const [phoneNumber, setPhoneNumber] = useState('');
            const [verificationCode, setVerificationCode] = useState('');
            const [verificationId, setVerificationId] = useState('');
            const [mfaResolver, setMfaResolver] = useState(null);

            const [loginAttempts, setLoginAttempts] = useState(0);
            const [isLockedOut, setIsLockedOut] = useState(false);
            const [authErrorMsg, setAuthErrorMsg] = useState('');

            // Dashboard States
            const [dashboardTab, setDashboardTab] = useState('cases'); 
            const [usersList, setUsersList] = useState([]);

            // Custom Confirm Modal State
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });

            useEffect(() => {
                if (loginAttempts >= 10) {
                    setIsLockedOut(true);
                    setAuthErrorMsg("ログイン失敗が規定回数に達したため、安全のために一時的にロックアウトされました。");
                }
            }, [loginAttempts]);

            // 修正箇所：ログインしている時だけデータを取得するように条件を追加
            useEffect(() => {
                if (!isLoggedIn) return;

                const unsubscribe = onSnapshot(collection(db, "cases"), (snapshot) => {
                    const casesData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setCases(casesData);
                }, (error) => {
                    console.error("Cases取得エラー:", error);
                });
                return () => unsubscribe();
            }, [isLoggedIn]);

            useEffect(() => {
                if (isLoggedIn && currentRole === 'admin') {
                    const unsubscribe = onSnapshot(collection(db, "users"), (snapshot) => {
                        const uData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setUsersList(uData);
                    }, (error) => {
                        console.error("Users取得エラー:", error);
                    });
                    return () => unsubscribe();
                }
            }, [isLoggedIn, currentRole]);

            const setupRecaptcha = () => {
                if (!window.recaptchaVerifier) {
                    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                        'size': 'invisible'
                    });
                }
            };

            const formatPhoneNumber = (phone) => {
                let formatted = phone.replace(/-/g, '');
                if (formatted.startsWith('0')) {
                    formatted = '+81' + formatted.slice(1);
                }
                return formatted;
            };

            const executeAuth = async (e) => {
                e.preventDefault();
                if (isLockedOut) return;
                setAuthErrorMsg('');

                try {
                    if (authMode === 'login') {
                        // Attempt standard login
                        const userCredential = await signInWithEmailAndPassword(auth, authData.email, authData.password);
                        const user = userCredential.user;
                        
                        // Check if MFA is already enrolled
                        const enrolledFactors = multiFactor(user).enrolledFactors;
                        if (enrolledFactors.length > 0) {
                            await finalizeLogin(user);
                        } else {
                            // Proceed to enrollment if not set
                            setAuthStep('enroll_phone');
                        }

                    } else {
                        // Registration flow
                        const userCredential = await createUserWithEmailAndPassword(auth, authData.email, authData.password);
                        const user = userCredential.user;
                        
                        await updateProfile(user, { displayName: authData.name });
                        const assignedRole = authData.email === MASTER_ADMIN_EMAIL ? 'admin' : 'employee';
                        const newUser = { id: user.uid, empId: authData.empId, name: authData.name, role: assignedRole, email: authData.email };
                        await setDoc(doc(db, "users", user.uid), newUser);
                        
                        setAuthStep('enroll_phone');
                    }
                } catch (error) {
                    console.error("Auth Error", error);
                    if (error.code === 'auth/multi-factor-auth-required') {
                        // MFA Required (Normal Login Flow for enrolled users)
                        try {
                            const resolver = getMultiFactorResolver(auth, error);
                            setMfaResolver(resolver);
                            setupRecaptcha();

                            const phoneInfoOptions = {
                                multiFactorHint: resolver.hints[0],
                                session: resolver.session
                            };
                            const phoneAuthProvider = new PhoneAuthProvider(auth);
                            const vId = await phoneAuthProvider.verifyPhoneNumber(phoneInfoOptions, window.recaptchaVerifier);
                            setVerificationId(vId);
                            setAuthStep('verify_signin');
                        } catch (mfaError) {
                            console.error("MFA Send Error", mfaError);
                            setAuthErrorMsg("認証コードの送信に失敗しました。時間をおいて再度お試しください。");
                            if(window.recaptchaVerifier) window.recaptchaVerifier.clear();
                        }
                    } else {
                        setLoginAttempts(prev => prev + 1);
                        setAuthErrorMsg("認証に失敗しました。メールアドレスとパスワードを確認してください。");
                    }
                }
            };

            const startMfaEnrollment = async (e) => {
                e.preventDefault();
                setAuthErrorMsg('');
                setupRecaptcha();
                
                try {
                    const user = auth.currentUser;
                    const session = await multiFactor(user).getSession();
                    const formattedPhone = formatPhoneNumber(phoneNumber);
                    const phoneInfoOptions = { phoneNumber: formattedPhone, session };
                    
                    const phoneAuthProvider = new PhoneAuthProvider(auth);
                    const vId = await phoneAuthProvider.verifyPhoneNumber(phoneInfoOptions, window.recaptchaVerifier);
                    setVerificationId(vId);
                    setAuthStep('verify_enroll');
                } catch (error) {
                    console.error("Enrollment Error", error);
                    setAuthErrorMsg("電話番号の確認に失敗しました。正しい番号を入力してください。");
                    if(window.recaptchaVerifier) window.recaptchaVerifier.clear();
                }
            };

            const verifyCodeAndEnroll = async (e) => {
                e.preventDefault();
                setAuthErrorMsg('');
                try {
                    const cred = PhoneAuthProvider.credential(verificationId, verificationCode);
                    const assertion = PhoneMultiFactorGenerator.assertion(cred);
                    await multiFactor(auth.currentUser).enroll(assertion, 'Personal Phone');
                    
                    await finalizeLogin(auth.currentUser);
                } catch (error) {
                    console.error("Verification Error", error);
                    setAuthErrorMsg("認証コードが正しくありません。");
                }
            };

            const verifyCodeAndSignIn = async (e) => {
                e.preventDefault();
                setAuthErrorMsg('');
                try {
                    const cred = PhoneAuthProvider.credential(verificationId, verificationCode);
                    const assertion = PhoneMultiFactorGenerator.assertion(cred);
                    const userCred = await mfaResolver.resolveSignIn(assertion);
                    
                    await finalizeLogin(userCred.user);
                } catch (error) {
                    console.error("Sign-in Verification Error", error);
                    setAuthErrorMsg("認証コードが正しくありません。");
                }
            };

            const finalizeLogin = async (user) => {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    let userData = docSnap.data();
                    
                    if (user.email === MASTER_ADMIN_EMAIL && userData.role !== 'admin') {
                        userData.role = 'admin';
                        await setDoc(docRef, { role: 'admin' }, { merge: true });
                    }

                    setCurrentUser(userData);
                    setCurrentRole(userData.role);
                    setIsLoggedIn(true);
                    setLoginAttempts(0);
                    
                    if (userData.role === 'employee') {
                        const myCase = cases.find(c => c.uid === user.uid);
                        if (myCase) {
                            openCase(myCase);
                        } else {
                            setCurrentView('detail');
                            setFormData({ uid: user.uid, empId: userData.empId, name: userData.name });
                            setCurrentPhase(0);
                        }
                    } else {
                        setCurrentView('dashboard');
                    }
                }
            };

            const handleLogout = () => {
                signOut(auth).then(() => {
                    setIsLoggedIn(false);
                    setCurrentUser(null);
                    setFormData({});
                    setAuthStep('email_password');
                    setPhoneNumber('');
                    setVerificationCode('');
                    if(window.recaptchaVerifier) {
                        window.recaptchaVerifier.clear();
                        window.recaptchaVerifier = null;
                    }
                });
            };

            const openCase = (caseData) => {
                setFormData(caseData);
                setCurrentPhase(caseData.phase || 0);
                setCurrentView('detail');
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleCheckboxChange = (e) => {
                const { name, checked } = e.target;
                setFormData(prev => ({ ...prev, [name]: checked }));
            };

            const canEdit = (role) => currentRole === 'admin' || currentRole === role;
            const currentRoleLabel = ROLES.find(r => r.id === currentRole)?.label;
            const CurrentRoleIcon = ROLES.find(r => r.id === currentRole)?.icon || User;
            const isAdmin = currentRole === 'admin';

            const saveData = async (extraData = {}) => {
                const newData = { ...formData, ...extraData };
                setFormData(newData);
                if (extraData.phase !== undefined) {
                    setCurrentPhase(extraData.phase);
                }

                try {
                    const saveId = newData.id || `case_${Date.now()}`;
                    await setDoc(doc(db, "cases", saveId), { ...newData, id: saveId }, { merge: true });
                    if (!newData.id) {
                        setFormData(prev => ({ ...prev, id: saveId }));
                    }
                } catch (error) {
                    console.error("保存エラー:", error);
                }
            };

            // Custom Confirm Helper
            const requestConfirm = (message, action) => {
                setConfirmDialog({ isOpen: true, message, onConfirm: action });
            };

            const resetData = () => {
                requestConfirm("現在入力中のデータを初期化(Phase 0)に戻します。本当によろしいですか？", async () => {
                    const newData = { id: formData.id, uid: formData.uid, empId: formData.empId, name: formData.name, department: formData.department, phase: 0 };
                    setFormData(newData);
                    setCurrentPhase(0);
                    if (formData.id) {
                        await setDoc(doc(db, "cases", formData.id), newData);
                    }
                });
            };

            const deleteCase = (caseId, caseName) => {
                requestConfirm(`${caseName}さんの申請データを完全に削除します。本当によろしいですか？`, async () => {
                    try {
                        await deleteDoc(doc(db, "cases", caseId));
                    } catch (error) {
                        console.error("Delete Error", error);
                    }
                });
            };

            const updateUserRole = (targetUserId, targetEmail, newRole) => {
                if (targetEmail === MASTER_ADMIN_EMAIL && newRole !== 'admin') return;
                
                requestConfirm("ユーザーの権限を更新します。よろしいですか？", async () => {
                    try {
                        await setDoc(doc(db, "users", targetUserId), { role: newRole }, { merge: true });
                    } catch (error) {
                        console.error("Role Update Error", error);
                    }
                });
            };

            const calculateRiskScore = () => {
                let score = 0;
                let reasons = [];

                if (formData.q_doc_restriction === 'yes') { score += 10; reasons.push('主治医から勤務制限あり (+10)'); }
                if (formData.q_danger_work === 'yes') { score += 8; reasons.push('危険作業・夜勤・運転等への影響あり (+8)'); }
                if (formData.q_absence === 'long') { score += 5; reasons.push('長期間の休業 (+5)'); }
                if (formData.mgr_safety_concern === 'yes') { score += 5; reasons.push('職制が安全面等に不安を感じている (+5)'); }
                
                if (formData.q_request_ohp === 'yes') { score += 2; reasons.push('本人が保健師相談を希望 (+2)'); }
                if (formData.q_request_care === 'yes') { score += 3; reasons.push('本人が職場の配慮を希望 (+3)'); }
                if (formData.q_request_care === 'yes' && formData.mgr_need_care === 'no') { score += 5; reasons.push('配慮に関する本人と職制の認識ズレ (+5)'); }

                let level = 0;
                if (score >= 15) level = 3;
                else if (score >= 8) level = 2;
                else if (score >= 3) level = 1;

                return { score, level, reasons };
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div id="recaptcha-container"></div>
                        
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
                            
                            <div className="text-center mb-6">
                                <Shield className="h-12 w-12 text-indigo-600 mx-auto mb-3" />
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">就業支援プログラム<br/>ポータル</h1>
                                <span className="inline-block bg-blue-100 text-blue-800 text-[10px] font-bold px-2 py-0.5 rounded mt-2">対策レベルⅡ 準拠 (MFA)</span>
                            </div>

                            {authStep === 'email_password' && (
                                <form onSubmit={executeAuth} className="space-y-4 animate-fade-in-up">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">メールアドレス</label>
                                        <input type="email" name="email" value={authData.email} onChange={(e) => setAuthData({...authData, email: e.target.value})} required disabled={isLockedOut} className="w-full p-2.5 border border-slate-300 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all"/>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">パスワード</label>
                                        <input type="password" name="password" value={authData.password} onChange={(e) => setAuthData({...authData, password: e.target.value})} required disabled={isLockedOut} minLength={6} className="w-full p-2.5 border border-slate-300 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all"/>
                                    </div>

                                    {authMode === 'register' && (
                                        <>
                                            <div>
                                                <label className="block text-sm font-bold text-slate-700 mb-1">社員番号</label>
                                                <input type="text" name="empId" value={authData.empId} onChange={(e) => setAuthData({...authData, empId: e.target.value})} required disabled={isLockedOut} className="w-full p-2.5 border border-slate-300 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all"/>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-slate-700 mb-1">氏名</label>
                                                <input type="text" name="name" value={authData.name} onChange={(e) => setAuthData({...authData, name: e.target.value})} required disabled={isLockedOut} className="w-full p-2.5 border border-slate-300 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all"/>
                                            </div>
                                        </>
                                    )}

                                    {authErrorMsg && (
                                        <div className="p-3 bg-red-50 text-red-700 text-sm rounded-lg border border-red-200 font-medium">
                                            {authErrorMsg}
                                        </div>
                                    )}

                                    <button type="submit" disabled={isLockedOut} className={`w-full py-3 rounded-lg font-bold text-white shadow-md transition-all ${isLockedOut ? 'bg-slate-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 hover:-translate-y-0.5'}`}>
                                        {authMode === 'login' ? 'ログイン' : 'アカウントを作成'}
                                    </button>

                                    <div className="mt-6 text-center text-sm">
                                        {authMode === 'login' ? (
                                            <button type="button" onClick={() => { setAuthMode('register'); setAuthErrorMsg(''); }} className="text-indigo-600 font-bold hover:underline">はじめての方はこちら（新規登録）</button>
                                        ) : (
                                            <button type="button" onClick={() => { setAuthMode('login'); setAuthErrorMsg(''); }} className="text-indigo-600 font-bold hover:underline">すでにアカウントをお持ちの方</button>
                                        )}
                                    </div>
                                </form>
                            )}

                            {authStep === 'enroll_phone' && (
                                <form onSubmit={startMfaEnrollment} className="space-y-4 animate-fade-in-up">
                                    <div className="bg-indigo-50 p-4 rounded-lg border border-indigo-100 mb-4">
                                        <h3 className="font-bold text-indigo-900 flex items-center gap-2 mb-2"><Smartphone className="w-5 h-5"/> セキュリティ設定</h3>
                                        <p className="text-sm text-indigo-800">安全のため、SMSを用いた多要素認証を設定します。携帯電話番号を入力してください。（※テスト用は 09000000000 を入力）</p>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">携帯電話番号 (ハイフンなし)</label>
                                        <input type="tel" value={phoneNumber} onChange={(e) => setPhoneNumber(e.target.value)} required placeholder="09012345678" className="w-full p-2.5 border border-slate-300 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all"/>
                                    </div>
                                    {authErrorMsg && <div className="p-3 bg-red-50 text-red-700 text-sm rounded-lg border border-red-200 font-medium">{authErrorMsg}</div>}
                                    <button type="submit" className="w-full py-3 rounded-lg font-bold text-white shadow-md transition-all bg-indigo-600 hover:bg-indigo-700">
                                        SMSに認証コードを送信
                                    </button>
                                </form>
                            )}

                            {(authStep === 'verify_enroll' || authStep === 'verify_signin') && (
                                <form onSubmit={authStep === 'verify_enroll' ? verifyCodeAndEnroll : verifyCodeAndSignIn} className="space-y-4 animate-fade-in-up">
                                    <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 mb-4">
                                        <p className="text-sm text-blue-900 font-bold">SMSに6桁の認証コードを送信しました。</p>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">認証コード (6桁)</label>
                                        <input type="text" value={verificationCode} onChange={(e) => setVerificationCode(e.target.value)} required maxLength={6} placeholder="123456" className="w-full p-3 text-center tracking-[0.5em] text-xl font-bold border border-slate-300 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all"/>
                                    </div>
                                    {authErrorMsg && <div className="p-3 bg-red-50 text-red-700 text-sm rounded-lg border border-red-200 font-medium">{authErrorMsg}</div>}
                                    <button type="submit" className="w-full py-3 rounded-lg font-bold text-white shadow-md transition-all bg-indigo-600 hover:bg-indigo-700">
                                        認証して完了
                                    </button>
                                    <button type="button" onClick={() => { setAuthStep('email_password'); setVerificationCode(''); if(window.recaptchaVerifier) window.recaptchaVerifier.clear(); }} className="w-full mt-2 text-sm text-slate-500 hover:text-slate-700 font-bold">
                                        最初からやり直す
                                    </button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 pb-20 relative">
                    {/* Custom Confirm Modal */}
                    {confirmDialog.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 flex items-center justify-center z-[100] backdrop-blur-sm p-4">
                            <div className="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full animate-fade-in-up border border-slate-200">
                                <div className="flex items-start gap-3 mb-6">
                                    <AlertTriangle className="w-6 h-6 text-orange-500 flex-shrink-0" />
                                    <p className="font-bold text-slate-800 leading-relaxed">{confirmDialog.message}</p>
                                </div>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setConfirmDialog({isOpen:false})} className="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors">キャンセル</button>

                                                                <input type="radio" name={q.name} value="no" checked={formData[q.name] === 'no'} onChange={handleInputChange} className="w-4 h-4 text-indigo-600 focus:ring-indigo-500"/>
                                                                <span className="text-slate-700 font-medium text-sm">いいえ</span>
                                                            </label>
                                                        </div>
                                                    </div>
                                                ))}

                                                <div className="flex justify-center mt-8">
                                                    <button onClick={() => saveData({ phase: 2 })} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-md flex items-center gap-2 transition-transform hover:scale-105">
                                                        評価を送信して自動判定へ <Activity className="w-5 h-5"/>
                                                    </button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="text-center p-12 bg-indigo-50 rounded-xl border border-indigo-100">
                                                <Clock className="w-12 h-12 text-indigo-300 mx-auto mb-4" />
                                                <h3 className="text-xl font-bold text-indigo-800 mb-2">職制の入力待ち</h3>
                                                <p className="text-indigo-600">現在、職制（上司）が安全面や受け入れ体制について評価を行っています。</p>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {}
                                {currentPhase === 2 && (
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 animate-fade-in-up">
                                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800 border-b pb-3">
                                            <Activity className="w-6 h-6 text-purple-600" /> 
                                            Phase 2: 自動判定 ＆ 専門職確認
                                        </h2>

                                        {(() => {
                                            const { score, level, reasons } = calculateRiskScore();
                                            return (
                                                <div className="mb-8">
                                                    <div className="bg-slate-800 text-white p-6 rounded-t-xl text-center relative overflow-hidden">
                                                        <div className="relative z-10 flex flex-col md:flex-row items-center justify-between gap-4">
                                                            <div className="text-left">
                                                                <p className="text-slate-400 font-bold mb-1 text-sm tracking-wider">SYSTEM RESULT</p>
                                                                <h3 className="text-2xl font-black">総合リスクスコア: <span className="text-4xl text-yellow-400 ml-2">{score}</span> <span className="text-lg text-slate-300">pt</span></h3>
                                                                <p className="text-xs text-slate-300 mt-2">※数値が高いほど、安全配慮や業務への影響リスクが高く、より上位の専門職の介入が推奨されます。</p>
                                                            </div>
                                                            <div className="text-right flex flex-col items-center">
                                                                <span className={`inline-block px-4 py-2 rounded-lg font-black text-xl shadow-lg border-2 border-white/20 ${level === 3 ? 'bg-red-500 text-white' : level === 2 ? 'bg-orange-500 text-white' : level === 1 ? 'bg-yellow-400 text-slate-900' : 'bg-green-500 text-white'}`}>
                                                                    {level === 3 ? 'Level 3: 5者打合せ' : level === 2 ? 'Level 2: 産業医面談' : level === 1 ? 'Level 1: 保健師確認' : 'Level 0: 通常復帰'}
                                                                </span>
                                                            </div>
                                                        </div>
                                                        <div className="w-full bg-slate-700 h-2 mt-6 rounded-full overflow-hidden flex">
                                                            <div className={`h-full ${score > 0 ? 'bg-green-500' : ''}`} style={{width: '13%'}}></div>
                                                            <div className={`h-full ${score >= 3 ? 'bg-yellow-400' : ''}`} style={{width: '33%'}}></div>
                                                            <div className={`h-full ${score >= 8 ? 'bg-orange-500' : ''}`} style={{width: '46%'}}></div>
                                                            <div className={`h-full ${score >= 15 ? 'bg-red-500' : ''}`} style={{width: '8%'}}></div>
                                                        </div>
                                                        <div className="flex justify-between text-[10px] text-slate-400 mt-1 font-bold">
                                                            <span>Lv0: 0-2</span>
                                                            <span className="ml-12">Lv1: 3-7</span>
                                                            <span className="ml-auto mr-12">Lv2: 8-14</span>
                                                            <span>Lv3: 15-</span>
                                                        </div>
                                                    </div>

                                                    <div className="bg-slate-50 border border-slate-200 border-t-0 rounded-b-xl p-6">
                                                        <h4 className="font-bold text-slate-700 mb-3 text-sm flex items-center gap-2">
                                                            <AlertTriangle className="w-4 h-4 text-slate-500"/> 加点理由の内訳
                                                        </h4>
                                                        {reasons.length > 0 ? (
                                                            <ul className="space-y-2">
                                                                {reasons.map((r, idx) => (
                                                                    <li key={idx} className={`flex items-start gap-2 text-sm font-medium p-2 rounded ${r.includes('認識ズレ') ? 'bg-red-100 text-red-800 border border-red-200' : 'text-slate-700'}`}>
                                                                        {r.includes('認識ズレ') ? <AlertTriangle className="w-4 h-4 text-red-600 mt-0.5 flex-shrink-0"/> : <Check className="w-4 h-4 text-slate-400 mt-0.5 flex-shrink-0"/>}
                                                                        {r}
                                                                    </li>
                                                                ))}
                                                            </ul>
                                                        ) : (
                                                            <p className="text-sm text-slate-500">特記すべきリスク要因はありません。</p>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })()}

                                        {canEdit('ohp') || isAdmin ? (
                                            <div className="border border-purple-200 rounded-xl p-6 bg-purple-50">
                                                <h3 className="font-bold text-purple-900 mb-4 flex items-center gap-2">
                                                    <Shield className="w-5 h-5"/> 最終ルートの決定（保健師・産業医）
                                                </h3>
                                                <p className="text-sm text-purple-800 mb-6">上記の自動判定結果を参考に、最終的な復帰ルートを決定してください。</p>
                                                
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                    <button onClick={() => saveData({ phase: 4 })} className="bg-white border-2 border-green-500 text-green-700 hover:bg-green-500 hover:text-white font-bold py-4 px-4 rounded-xl shadow-sm transition-all flex flex-col items-center justify-center gap-2 group">
                                                        <span className="text-lg">A. 通常復帰</span>
                                                        <span className="text-xs font-normal opacity-80 group-hover:opacity-100 text-center">PG導入・面談なし</span>
                                                    </button>
                                                    <button onClick={() => saveData({ phase: 4 })} className="bg-white border-2 border-orange-500 text-orange-700 hover:bg-orange-500 hover:text-white font-bold py-4 px-4 rounded-xl shadow-sm transition-all flex flex-col items-center justify-center gap-2 group">
                                                        <span className="text-lg">B. 条件付復帰</span>
                                                        <span className="text-xs font-normal opacity-80 group-hover:opacity-100 text-center">面談後、配慮付きで復帰<br/>(PGは導入しない)</span>
                                                    </button>
                                                    <button onClick={() => saveData({ phase: 3, subPhase: 'phase1' })} className="bg-purple-600 text-white hover:bg-purple-700 font-bold py-4 px-4 rounded-xl shadow-md transition-all flex flex-col items-center justify-center gap-2 transform hover:scale-105">
                                                        <span className="text-lg">C. 就業支援PGへ</span>
                                                        <span className="text-xs font-normal text-purple-200 text-center">Phase Ⅰ (療養専念期)を開始</span>
                                                    </button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="text-center p-8 bg-purple-50 rounded-xl border border-purple-100">
                                                <Clock className="w-10 h-10 text-purple-300 mx-auto mb-3" />
                                                <p className="text-purple-700 font-bold">現在、保健師・産業医が判定内容を確認し、最終ルートを検討中です。</p>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {}
                                {currentPhase === 3 && (
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 animate-fade-in-up">
                                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800 border-b pb-3">
                                            <span className="bg-blue-600 text-white px-3 py-1 rounded-md text-sm">就業支援PG</span>
                                            Phase Ⅰ 療養専念期
                                        </h2>
                                        
                                        <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-8">
                                            <p className="text-blue-900 text-sm font-medium">治療・療養を最優先とし、日常生活リズムの確立に取り組む段階です。療養が長期化する場合（1ヶ月以上目安）は、「療養状況報告書」を提出してください。</p>
                                        </div>

                                        {canEdit('employee') ? (
                                            <div className="space-y-8">
                                                <div className="border border-slate-200 rounded-lg p-6 bg-slate-50">
                                                    <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2">
                                                        <FileText className="w-5 h-5 text-slate-600"/> 療養状況報告書（月1回程度提出）
                                                    </h3>
                                                    <div className="space-y-4">
                                                        <div>
                                                            <label className="block text-sm font-medium text-slate-700 mb-1">1. 最近の健康状態について（症状・体調面など）</label>
                                                            <textarea name="report_health" value={formData.report_health || ''} onChange={handleInputChange} className="w-full p-3 border border-slate-300 rounded-md bg-white h-24"></textarea>
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm font-medium text-slate-700 mb-1">2. 主治医の先生のコメント（症状回復の程度、職場復帰の見通しなど）</label>
                                                            <textarea name="report_doctor" value={formData.report_doctor || ''} onChange={handleInputChange} className="w-full p-3 border border-slate-300 rounded-md bg-white h-24"></textarea>
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm font-medium text-slate-700 mb-1">3. 復帰準備の開始希望</label>
                                                            <div className="flex gap-4">
                                                                <label className="flex items-center gap-2 cursor-pointer">
                                                                    <input type="radio" name="report_desire" value="prepare" checked={formData.report_desire === 'prepare'} onChange={handleInputChange} className="w-4 h-4 text-blue-600"/>
                                                                    <span className="text-slate-700 font-medium text-sm">復帰準備の開始を希望する（PhaseⅡへ進みたい）</span>
                                                                </label>
                                                                <label className="flex items-center gap-2 cursor-pointer">
                                                                    <input type="radio" name="report_desire" value="rest" checked={formData.report_desire === 'rest'} onChange={handleInputChange} className="w-4 h-4 text-blue-600"/>
                                                                    <span className="text-slate-700 font-medium text-sm">引き続き療養に専念する</span>
                                                                </label>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="border border-slate-200 rounded-lg p-6">
                                                    <h3 className="font-bold text-slate-800 mb-4">Phase Ⅰ 達成項目チェックリスト</h3>
                                                    <p className="text-sm text-slate-600 mb-4">すべての項目がクリアできたら、チェックを入れて「復帰準備期へ進む」を押してください。</p>
                                                    <div className="space-y-2">
                                                        {[
                                                            {id: 'p1_c1', label: '1. 職場復帰をしたいと考えている'},
                                                            {id: 'p1_c2', label: '2. 復帰準備を開始することについて、主治医は同意している'},
                                                            {id: 'p1_c3', label: '3. 会社との連絡で、体調が悪化することはない'},
                                                            {id: 'p1_c4', label: '4. 体調は十分に回復している'},
                                                            {id: 'p1_c5', label: '5. 睡眠リズムが整っている（昼間の眠気がない状態）'},
                                                            {id: 'p1_c6', label: '6. 食事のリズム、回数、量などを正しくコントロールできている'},
                                                            {id: 'p1_c7', label: '7. 日中の外出・身体を動かす事に対して、億劫感はない'},
                                                            {id: 'p1_c8', label: '8. 新聞や書籍など、活字を読む事に対して、億劫感はない'},
                                                            {id: 'p1_c9', label: '9. 定期受診をきちんとしており、何かあれば主治医に相談できる'},
                                                            {id: 'p1_c10', label: '10. 主治医の指示通りに療養している（薬など）'}
                                                        ].map(item => (
                                                            <label key={item.id} className="flex items-start gap-3 p-2 hover:bg-slate-50 rounded cursor-pointer">
                                                                <input type="checkbox" name={item.id} checked={formData[item.id] || false} onChange={handleCheckboxChange} className="mt-1 w-4 h-4 text-blue-600 rounded border-slate-300"/>
                                                                <span className="text-slate-700 text-sm leading-tight">{item.label}</span>
                                                            </label>
                                                        ))}
                                                    </div>
                                                </div>
                                                
                                                <div className="flex justify-between items-center mt-8 pt-6 border-t border-slate-100">
                                                    <button onClick={() => saveData({})} className="px-6 py-2 border border-slate-300 text-slate-600 rounded-md hover:bg-slate-50 font-medium">報告を保存</button>
                                                    <button onClick={() => saveData({ phase: 4 })} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-md shadow-sm flex items-center gap-2">復帰 (Phase Ⅲ 相当) へ進む <ChevronRight className="w-5 h-5"/></button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="space-y-6">
                                                <div className="border border-slate-200 rounded-lg p-6 bg-slate-50">
                                                    <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2">
                                                        <FileText className="w-5 h-5 text-slate-600"/> 提出された療養状況報告書
                                                    </h3>
                                                    <dl className="space-y-4 text-sm">
                                                        <div><dt className="text-slate-500 mb-1">健康状態:</dt><dd className="text-slate-800 font-medium bg-white p-3 rounded border border-slate-200 min-h-[3rem] whitespace-pre-wrap">{formData.report_health || '未提出'}</dd></div>
                                                        <div><dt className="text-slate-500 mb-1">主治医のコメント:</dt><dd className="text-slate-800 font-medium bg-white p-3 rounded border border-slate-200 min-h-[3rem] whitespace-pre-wrap">{formData.report_doctor || '未提出'}</dd></div>
                                                        <div><dt className="text-slate-500 mb-1">本人の希望:</dt><dd className="text-slate-800 font-medium bg-white p-3 rounded border border-slate-200">{formData.report_desire === 'prepare' ? '復帰準備の開始を希望する' : formData.report_desire === 'rest' ? '引き続き療養に専念する' : '未選択'}</dd></div>
                                                    </dl>
                                                </div>
                                                
                                                {(isAdmin || canEdit('ohp')) && (
                                                    <div className="flex justify-end mt-4">
                                                        <button onClick={() => saveData({ phase: 4 })} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md shadow-sm">管理者として強制的に完了フェーズへ進める</button>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {}
                                {currentPhase === 4 && (
                                    <div className="bg-white p-12 rounded-xl shadow-sm border border-slate-200 text-center animate-fade-in-up">
                                        <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-100 mb-6">
                                            <CheckCircle className="w-10 h-10 text-green-600" />
                                        </div>
                                        <h2 className="text-2xl font-bold text-slate-800 mb-4">就業支援プログラム 完了</h2>
                                        <p className="text-slate-600 mb-8 max-w-lg mx-auto">
                                            通常業務への復帰プロセスがすべて完了しました。<br/>
                                            今後のご活躍と、健康の維持をお祈りしております。体調に変化があった場合は、いつでも職制または健康支援センターへご相談ください。
                                        </p>
                                        {currentRole !== 'employee' && (
                                            <button onClick={() => setCurrentView('dashboard')} className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 px-6 rounded-md shadow-sm transition-colors">
                                                ダッシュボードへ戻る
                                            </button>
                                        )}
                                    </div>
                                )}
                                
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<HealthSupportPortal />);
    </script>
</body>
</html>
