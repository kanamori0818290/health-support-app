<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私傷病・就業支援ポータル</title>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.294.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
        }
    }
    </script>

    <style>
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Upload, FileText, CheckCircle, Clock, ChevronRight, ChevronLeft, User, Users, Briefcase, HeartPulse, Shield, LogOut, Lock, Check, Activity, AlertTriangle, Info, RotateCcw, Trash2, Smartphone, Mail } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, sendEmailVerification, multiFactor, PhoneAuthProvider, PhoneMultiFactorGenerator, RecaptchaVerifier, getMultiFactorResolver } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, deleteDoc } from 'firebase/firestore';

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDHqkBNSSsakVwHxKdWZ4hNoSM9wORbLR4",
            authDomain: "health-support-portal.firebaseapp.com",
            projectId: "health-support-portal",
            storageBucket: "health-support-portal.firebasestorage.app",
            messagingSenderId: "71602892006",
            appId: "1:71602892006:web:c99fe5343191e65a2fdf27",
            measurementId: "G-FED2KDFGJ7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 新規ユーザー作成用のサブインスタンス（管理者がログアウトされないためのハック）
        const secondaryApp = initializeApp(firebaseConfig, "SecondaryApp");
        const secondaryAuth = getAuth(secondaryApp);

        const ROLES = [
            { id: 'admin', label: 'システム管理者', icon: Lock },
            { id: 'employee', label: '従業員 (本人)', icon: User },
            { id: 'manager', label: '職制 (上司)', icon: Briefcase },
            { id: 'ohp', label: '保健師・産業医', icon: HeartPulse }
        ];

        // PHASESの定義（全5フェーズ + 完了）
        const PHASES = [
            { id: 0, title: '発生報告', desc: '本人入力' },
            { id: 1, title: '職制評価', desc: '上司確認' },
            { id: 2, title: '専門職判定', desc: '自動スコア' },
            { id: 3, title: '就業支援PG', desc: '療養・準備' },
            { id: 4, title: 'フォロー', desc: '面談シート' }
        ];

        const MASTER_ADMIN_EMAIL = "yuuto.kanamori.ma@mcgc.com";

        function HealthSupportPortal() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentRole, setCurrentRole] = useState('');
            const [currentUser, setCurrentUser] = useState(null);
            const [isDemoMode, setIsDemoMode] = useState(false);
            
            const [currentView, setCurrentView] = useState('detail'); 
            const [currentPhase, setCurrentPhase] = useState(0); // 表示用タブ
            const [formData, setFormData] = useState({});
            const [cases, setCases] = useState([]); 

            const [authMode, setAuthMode] = useState('login'); 
            const [authStep, setAuthStep] = useState('email_password'); 
            const [authData, setAuthData] = useState({ email: '', password: '', empId: '', name: '' });
            const [phoneNumber, setPhoneNumber] = useState('');
            const [verificationCode, setVerificationCode] = useState('');
            const [verificationId, setVerificationId] = useState('');
            const [mfaResolver, setMfaResolver] = useState(null);
            const [loginAttempts, setLoginAttempts] = useState(0);
            const [isLockedOut, setIsLockedOut] = useState(false);
            const [authErrorMsg, setAuthErrorMsg] = useState('');

            const [dashboardTab, setDashboardTab] = useState('cases'); 
            const [usersList, setUsersList] = useState([]);
            const [showCreateUserModal, setShowCreateUserModal] = useState(false);
            const [newUserData, setNewUserData] = useState({ empId: '', name: '', email: '', password: '', role: 'employee' });
            const [adminCreateMsg, setAdminCreateMsg] = useState({ type: '', text: '' });
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });

            // 実際の進捗フェーズ
            const actualPhase = formData.phase || 0;

            useEffect(() => {
                if (loginAttempts >= 10) {
                    setIsLockedOut(true);
                    setAuthErrorMsg("ログイン失敗が規定回数に達したため、一時的にロックアウトされました。");
                }
            }, [loginAttempts]);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (user) => {
                    if (user && !isDemoMode) {
                        try {
                            const enrolledFactors = multiFactor(user).enrolledFactors;
                            if (enrolledFactors.length > 0 || user.email === MASTER_ADMIN_EMAIL) {
                                const docRef = doc(db, "users", user.uid);
                                const docSnap = await getDoc(docRef);
                                if (docSnap.exists()) {
                                    let userData = docSnap.data();
                                    setCurrentUser(userData);
                                    setCurrentRole(userData.role);
                                    setIsLoggedIn(true);
                                    if (userData.role === 'employee') setCurrentView('detail');
                                    else setCurrentView('dashboard');
                                } else {
                                    handleLogout();
                                }
                            }
                        } catch (error) {
                            console.error("Session Restore Error:", error);
                            handleLogout();
                        }
                    }
                });
                return () => unsubscribe();
            }, [isDemoMode]);

            useEffect(() => {
                if (!isLoggedIn || isDemoMode) return;
                const unsubscribe = onSnapshot(collection(db, "cases"), (snapshot) => {
                    const casesData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setCases(casesData);
                });
                return () => unsubscribe();
            }, [isLoggedIn, isDemoMode]);

            useEffect(() => {
                if (isLoggedIn && currentRole === 'admin' && !isDemoMode) {
                    const unsubscribe = onSnapshot(collection(db, "users"), (snapshot) => {
                        const uData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setUsersList(uData);
                    });
                    return () => unsubscribe();
                }
            }, [isLoggedIn, currentRole, isDemoMode]);

            const setupRecaptcha = () => {
                try { if(window.recaptchaVerifier) window.recaptchaVerifier.clear(); } catch(e){}
                window.recaptchaVerifier = null;
                const container = document.getElementById('recaptcha-container');
                if (container) container.innerHTML = '';
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            };

            const formatPhoneNumber = (phone) => {
                let formatted = phone.replace(/-/g, '');
                if (formatted.startsWith('0')) formatted = '+81' + formatted.slice(1);
                return formatted;
            };

            const executeAuth = async (e) => {
                e.preventDefault();
                if (isLockedOut) return;
                setAuthErrorMsg('');
                try {
                    if (authMode === 'login') {
                        const userCredential = await signInWithEmailAndPassword(auth, authData.email, authData.password);
                        const user = userCredential.user;
                        if (!user.emailVerified) { setAuthStep('verify_email'); return; }
                        const enrolledFactors = multiFactor(user).enrolledFactors;
                        if (enrolledFactors.length > 0) { await finalizeLogin(user); } 
                        else { setAuthStep('enroll_phone'); }
                    } else {
                        const userCredential = await createUserWithEmailAndPassword(auth, authData.email, authData.password);
                        const user = userCredential.user;
                        await updateProfile(user, { displayName: authData.name });
                        const assignedRole = authData.email === MASTER_ADMIN_EMAIL ? 'admin' : 'employee';
                        const newUser = { id: user.uid, empId: authData.empId, name: authData.name, role: assignedRole, email: authData.email };
                        await setDoc(doc(db, "users", user.uid), newUser);
                        await sendEmailVerification(user);
                        setAuthStep('verify_email');
                    }
                } catch (error) {
                    if (error.code === 'auth/multi-factor-auth-required') {
                        try {
                            const resolver = getMultiFactorResolver(auth, error);
                            setMfaResolver(resolver);
                            setupRecaptcha();
                            const phoneInfoOptions = { multiFactorHint: resolver.hints[0], session: resolver.session };
                            const phoneAuthProvider = new PhoneAuthProvider(auth);
                            const vId = await phoneAuthProvider.verifyPhoneNumber(phoneInfoOptions, window.recaptchaVerifier);
                            setVerificationId(vId);
                            setAuthStep('verify_signin');
                        } catch (mfaError) {
                            setAuthErrorMsg("認証コードの送信に失敗しました。");
                        }
                    } else {
                        setLoginAttempts(prev => prev + 1);
                        setAuthErrorMsg("認証に失敗しました。メールアドレスとパスワードを確認してください。");
                    }
                }
            };

            const checkEmailVerification = async () => {
                setAuthErrorMsg('');
                try {
                    await auth.currentUser.reload();
                    if (auth.currentUser.emailVerified) setAuthStep('enroll_phone');
                    else setAuthErrorMsg("まだメールの確認が完了していません。");
                } catch (error) { handleLogout(); }
            };
            
            const resendVerificationEmail = async () => {
                try { await sendEmailVerification(auth.currentUser); setAuthErrorMsg("確認メールを再送信しました。"); } 
                catch (error) { setAuthErrorMsg("メールの送信に失敗しました。"); }
            };

            const startMfaEnrollment = async (e) => {
                e.preventDefault();
                setAuthErrorMsg('');
                try {
                    const formattedPhone = formatPhoneNumber(phoneNumber);
                    if (formattedPhone === '+819000000000') {
                         setVerificationId('dummy'); setAuthStep('verify_enroll'); return;
                    }
                    setupRecaptcha();
                    const user = auth.currentUser;
                    const session = await multiFactor(user).getSession();
                    const phoneInfoOptions = { phoneNumber: formattedPhone, session };
                    const phoneAuthProvider = new PhoneAuthProvider(auth);
                    const vId = await phoneAuthProvider.verifyPhoneNumber(phoneInfoOptions, window.recaptchaVerifier);
                    setVerificationId(vId);
                    setAuthStep('verify_enroll');
                } catch (error) { setAuthErrorMsg("電話番号の確認に失敗しました。"); }
            };

            const verifyCodeAndEnroll = async (e) => {
                e.preventDefault();
                setAuthErrorMsg('');
                try {
                    if (verificationId === 'dummy' && verificationCode === '123456') { await finalizeLogin(auth.currentUser); return; }
                    const cred = PhoneAuthProvider.credential(verificationId, verificationCode);
                    const assertion = PhoneMultiFactorGenerator.assertion(cred);
                    try { await multiFactor(auth.currentUser).enroll(assertion, 'Personal Phone'); } 
                    catch (enrollError) { if (enrollError.code !== 'auth/second-factor-already-in-use') throw enrollError; }
                    await finalizeLogin(auth.currentUser);
                } catch (error) { setAuthErrorMsg("認証コードが正しくありません。"); }
            };

            const verifyCodeAndSignIn = async (e) => {
                e.preventDefault();
                setAuthErrorMsg('');
                try {
                    const cred = PhoneAuthProvider.credential(verificationId, verificationCode);
                    const assertion = PhoneMultiFactorGenerator.assertion(cred);
                    const userCred = await mfaResolver.resolveSignIn(assertion);
                    await finalizeLogin(userCred.user);
                } catch (error) { setAuthErrorMsg("認証コードが正しくありません。"); }
            };

            const finalizeLogin = async (user) => {
                try {
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        let userData = docSnap.data();
                        if (user.email === MASTER_ADMIN_EMAIL && userData.role !== 'admin') {
                            userData.role = 'admin';
                            await setDoc(docRef, { role: 'admin' }, { merge: true });
                        }
                        setCurrentUser(userData); setCurrentRole(userData.role); setIsLoggedIn(true); setLoginAttempts(0);
                        if (userData.role === 'employee') {
                            const myCase = cases.find(c => c.uid === user.uid);
                            if (myCase) openCase(myCase);
                            else { setCurrentView('detail'); setFormData({ uid: user.uid, empId: userData.empId, name: userData.name }); setCurrentPhase(0); }
                        } else { setCurrentView('dashboard'); }
                    } else {
                        const newRole = user.email === MASTER_ADMIN_EMAIL ? 'admin' : 'employee';
                        const fallbackData = { id: user.uid, empId: 'N/A', name: user.displayName || '名無し', role: newRole, email: user.email };
                        await setDoc(docRef, fallbackData);
                        setCurrentUser(fallbackData); setCurrentRole(fallbackData.role); setIsLoggedIn(true); setLoginAttempts(0);
                        if (newRole === 'employee') { setCurrentView('detail'); setCurrentPhase(0); } else { setCurrentView('dashboard'); }
                    }
                } catch(e) { handleLogout(); }
            };

            const handleLogout = () => {
                setIsDemoMode(false);
                signOut(auth).then(() => {
                    setIsLoggedIn(false); setCurrentUser(null); setFormData({}); setAuthStep('email_password'); setPhoneNumber(''); setVerificationCode('');
                    if(window.recaptchaVerifier) { try{window.recaptchaVerifier.clear();}catch(e){} window.recaptchaVerifier = null; }
                });
            };

            const handleCreateUserByAdmin = async (e) => {
                e.preventDefault();
                setAdminCreateMsg({ type: '', text: '' });
                try {
                    const userCredential = await createUserWithEmailAndPassword(secondaryAuth, newUserData.email, newUserData.password);
                    const newUser = userCredential.user;
                    await updateProfile(newUser, { displayName: newUserData.name });
                    const dbUserData = { id: newUser.uid, empId: newUserData.empId, name: newUserData.name, role: newUserData.role, email: newUserData.email };
                    await setDoc(doc(db, "users", newUser.uid), dbUserData);
                    await signOut(secondaryAuth);
                    setAdminCreateMsg({ type: 'success', text: `${newUserData.name} さんのアカウントを作成しました！` });
                    setNewUserData({ empId: '', name: '', email: '', password: '', role: 'employee' });
                    setTimeout(() => { setShowCreateUserModal(false); setAdminCreateMsg({ type: '', text: '' }); }, 1500);
                } catch (error) {
                    if (error.code === 'auth/email-already-in-use') setAdminCreateMsg({ type: 'error', text: 'このメールアドレスは既に登録されています。' });
                    else if (error.code === 'auth/weak-password') setAdminCreateMsg({ type: 'error', text: 'パスワードは6文字以上で設定してください。' });
                    else setAdminCreateMsg({ type: 'error', text: 'ユーザーの作成に失敗しました。' });
                }
            };

            const startDemoLogin = (roleId) => {
                setIsDemoMode(true);
                setCurrentRole(roleId);
                setCurrentUser({ name: 'デモユーザー', role: roleId, empId: '99999' });
                setIsLoggedIn(true);
                
                // ダミーデータをセットして様々なフェーズが確認できるようにする
                if (roleId === 'employee') {
                    setCurrentView('detail');
                    setFormData({ id: 'demo_case', empId: '99999', name: 'デモユーザー', department: 'デモ部', phase: 0 });
                    setCurrentPhase(0);
                } else {
                    setCurrentView('dashboard');
                    setCases([
                        { id: 'd1', empId: '10001', name: '山田 太郎', department: '営業部', phase: 0, symptom: '腰痛', absence_duration: 'over_1week' },
                        { id: 'd2', empId: '10002', name: '佐藤 花子', department: '総務部', phase: 1, symptom: '適応障害', q_request_ohp: 'yes' },
                        { id: 'd3', empId: '10003', name: '鈴木 一郎', department: '製造部', phase: 2, mgr_safety_concern: 'yes', mgr_need_care: 'yes' },
                        { id: 'd4', empId: '10004', name: '高橋 健太', department: '開発部', phase: 3, report_health: '安定しています', report_desire: 'prepare' },
                        { id: 'd5', empId: '10005', name: '伊藤 美咲', department: '人事部', phase: 4, emp_q1: '4', mgr_q1: '3' },
                    ]);
                    setUsersList([
                        { id: 'u1', empId: '10001', name: '山田 太郎', email: 'yamada@demo.com', role: 'employee' },
                        { id: 'u2', empId: '20001', name: '鈴木 課長', email: 'suzuki@demo.com', role: 'manager' },
                        { id: 'u3', empId: '30001', name: '田中 産業医', email: 'tanaka@demo.com', role: 'ohp' }
                    ]);
                }
            };

            const openCase = (caseData) => {
                setFormData(caseData);
                setCurrentPhase(caseData.phase || 0);
                setCurrentView('detail');
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };
            const handleCheckboxChange = (e) => {
                const { name, checked } = e.target;
                setFormData(prev => ({ ...prev, [name]: checked }));
            };

            const canEdit = (role) => currentRole === 'admin' || currentRole === role;
            const currentRoleLabel = ROLES.find(r => r.id === currentRole)?.label;
            const CurrentRoleIcon = ROLES.find(r => r.id === currentRole)?.icon || User;
            const isAdmin = currentRole === 'admin';

            const saveData = async (extraData = {}) => {
                const newData = { ...formData, ...extraData };
                setFormData(newData);
                if (extraData.phase !== undefined) setCurrentPhase(extraData.phase);

                if (!isDemoMode) {
                    try {
                        const saveId = newData.id || `case_${Date.now()}`;
                        await setDoc(doc(db, "cases", saveId), { ...newData, id: saveId }, { merge: true });
                        if (!newData.id) setFormData(prev => ({ ...prev, id: saveId }));
                    } catch (error) { console.error("保存エラー:", error); }
                }
            };

            const requestConfirm = (message, action) => { setConfirmDialog({ isOpen: true, message, onConfirm: action }); };
            const resetData = () => {
                requestConfirm("現在入力中のデータを初期化(Phase 0)に戻します。本当によろしいですか？", async () => {
                    const newData = { id: formData.id, uid: formData.uid, empId: formData.empId, name: formData.name, department: formData.department, phase: 0 };
                    setFormData(newData); setCurrentPhase(0);
                    if (!isDemoMode && formData.id) await setDoc(doc(db, "cases", formData.id), newData);
                });
            };
            const deleteCase = (caseId, caseName) => {
                requestConfirm(`${caseName}さんのデータを完全に削除します。よろしいですか？`, async () => {
                    if (!isDemoMode) { try { await deleteDoc(doc(db, "cases", caseId)); } catch (error) {} } 
                    else { setCases(cases.filter(c => c.id !== caseId)); }
                });
            };
            const updateUserRole = (targetUserId, targetEmail, newRole) => {
                if (targetEmail === MASTER_ADMIN_EMAIL && newRole !== 'admin') return;
                requestConfirm("権限を更新します。よろしいですか？", async () => {
                    if (!isDemoMode) { try { await setDoc(doc(db, "users", targetUserId), { role: newRole }, { merge: true }); } catch (error) {} } 
                    else { setUsersList(usersList.map(u => u.id === targetUserId ? { ...u, role: newRole } : u)); }
                });
            };

            const calculateRiskScore = () => {
                let score = 0; let reasons = [];
                if (formData.q_doc_restriction === 'yes') { score += 10; reasons.push('主治医から勤務制限あり (+10)'); }
                if (formData.q_danger_work === 'yes') { score += 8; reasons.push('危険作業・夜勤・運転等への影響あり (+8)'); }
                if (formData.q_absence === 'long') { score += 5; reasons.push('長期間の休業 (+5)'); }
                if (formData.mgr_safety_concern === 'yes') { score += 5; reasons.push('職制が安全面等に不安を感じている (+5)'); }
                if (formData.q_request_ohp === 'yes') { score += 2; reasons.push('本人が保健師相談を希望 (+2)'); }
                if (formData.q_request_care === 'yes') { score += 3; reasons.push('本人が職場の配慮を希望 (+3)'); }
                if (formData.q_request_care === 'yes' && formData.mgr_need_care === 'no') { score += 5; reasons.push('配慮に関する本人と職制の認識ズレ (+5)'); }
                let level = 0;
                if (score >= 15) level = 3; else if (score >= 8) level = 2; else if (score >= 3) level = 1;
                return { score, level, reasons };
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div id="recaptcha-container"></div>
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
                            <div className="text-center mb-6">
                                <Shield className="h-12 w-12 text-indigo-600 mx-auto mb-3" />
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">就業支援プログラム<br/>ポータル</h1>
                            </div>

                            {authStep === 'email_password' && (
                                <form onSubmit={executeAuth} className="space-y-4 animate-fade-in-up">
                                    <div><label className="block text-sm font-bold text-slate-700 mb-1">メールアドレス</label><input type="email" name="email" value={authData.email} onChange={(e) => setAuthData({...authData, email: e.target.value})} required disabled={isLockedOut} className="w-full p-2.5 border border-slate-300 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all"/></div>
                                    <div><label className="block text-sm font-bold text-slate-700 mb-1">パスワード</label><input type="password" name="password" value={authData.password} onChange={(e) => setAuthData({...authData, password: e.target.value})} required disabled={isLockedOut} minLength={6} className="w-full p-2.5 border border-slate-300 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all"/></div>
                                    {authMode === 'register' && (
                                        <>
                                            <div><label className="block text-sm font-bold text-slate-700 mb-1">社員番号</label><input type="text" name="empId" value={authData.empId} onChange={(e) => setAuthData({...authData, empId: e.target.value})} required disabled={isLockedOut} className="w-full p-2.5 border border-slate-300 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all"/></div>
                                            <div><label className="block text-sm font-bold text-slate-700 mb-1">氏名</label><input type="text" name="name" value={authData.name} onChange={(e) => setAuthData({...authData, name: e.target.value})} required disabled={isLockedOut} className="w-full p-2.5 border border-slate-300 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all"/></div>
                                        </>

                                        <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-100 mb-6"><CheckCircle className="w-10 h-10 text-green-600" /></div>
                                        <h2 className="text-2xl font-bold text-slate-800 mb-4">就業支援プログラム 完了</h2>
                                        <p className="text-slate-600 mb-8 max-w-lg mx-auto">通常業務への復帰が確認されました。今後のご活躍と、健康の維持をお祈りしております。体調に変化があった場合は、いつでも職制または健康支援センターへご相談ください。</p>
                                        {currentRole !== 'employee' && <button onClick={() => setCurrentView('dashboard')} className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 px-6 rounded-md shadow-sm transition-colors">ダッシュボードへ戻る</button>}
                                    </div>
                                )}

                                {(isAdmin || currentRole === 'ohp') && (
                                    <div className="mt-8 bg-amber-50 rounded-xl p-6 shadow-sm border border-amber-200 border-l-4 border-l-amber-500 animate-fade-in-up">
                                        <h3 className="text-amber-900 font-bold mb-2 flex items-center gap-2"><Lock className="w-5 h-5 text-amber-600" /> 専門職専用 対応履歴 / 面談メモ（非公開）</h3>
                                        <p className="text-amber-700 text-xs mb-4">この入力欄は本人および職制（上司）には表示されません。産業保健スタッフ間の情報共有として使用してください。</p>
                                        <textarea name="ohp_secret_memo" value={formData.ohp_secret_memo || ''} onChange={handleInputChange} placeholder="例: 〇月〇日 本人と面談。睡眠状況は改善傾向にあるが、朝の倦怠感が残っているとのこと。次回〇日に再度面談予定。" className="w-full p-4 border border-amber-300 rounded-md bg-white text-slate-800 h-40 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none placeholder-slate-400 shadow-inner"></textarea>
                                        <div className="flex justify-end mt-4"><button onClick={() => saveData({})} className="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-6 rounded-md shadow-sm transition-colors">メモを保存</button></div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<HealthSupportPortal />);
    </script>
</body>
</html>
