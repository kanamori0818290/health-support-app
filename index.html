                        try {
                            const enrolledFactors = multiFactor(user).enrolledFactors;
                            if (enrolledFactors.length > 0 || user.email === MASTER_ADMIN_EMAIL) {
                                const docRef = doc(db, "users", user.uid);

                                    let userData = docSnap.data();
                                    setCurrentUser(userData); setCurrentRole(userData.role); setIsLoggedIn(true);

                                } else { handleLogout(); }
                            }
                        } catch (error) { handleLogout(); }
                    }
                });
                return () => unsubscribe();
            }, [isDemoMode]);

            useEffect(() => {
                if (!isLoggedIn || isDemoMode) return;

                return () => unsubscribe();

                    return () => unsubscribe();

            const executeAuth = async (e) => {

                        const user = userCredential.user;
                        if (!user.emailVerified) { setAuthStep('verify_email'); return; }
                        const enrolledFactors = multiFactor(user).enrolledFactors;
                        if (enrolledFactors.length > 0) { await finalizeLogin(user); } 
                        else { setAuthStep('enroll_phone'); }
                    } else {
                        const userCredential = await createUserWithEmailAndPassword(auth, authData.email, authData.password);
                        const user = userCredential.user;
                        await updateProfile(user, { displayName: authData.name });
                        const assignedRole = authData.email === MASTER_ADMIN_EMAIL ? 'admin' : 'employee';
                        const newUser = { id: user.uid, empId: authData.empId, name: authData.name, role: assignedRole, email: authData.email };
                        await setDoc(doc(db, "users", user.uid), newUser);
                        await sendEmailVerification(user);
                        setAuthStep('verify_email');
                    }
                } catch (error) {
                    if (error.code === 'auth/multi-factor-auth-required') {
                        try {
                            const resolver = getMultiFactorResolver(auth, error);
                            setMfaResolver(resolver); setupRecaptcha();
                            const phoneInfoOptions = { multiFactorHint: resolver.hints[0], session: resolver.session };
                            const phoneAuthProvider = new PhoneAuthProvider(auth);
                            const vId = await phoneAuthProvider.verifyPhoneNumber(phoneInfoOptions, window.recaptchaVerifier);
                            setVerificationId(vId); setAuthStep('verify_signin');
                        } catch (mfaError) { setAuthErrorMsg("認証コードの送信に失敗しました。"); }
                    } else {
                        setLoginAttempts(prev => prev + 1); setAuthErrorMsg("認証に失敗しました。メールアドレスとパスワードを確認してください。");
                    }
                }
            };

            const checkEmailVerification = async () => {
                setAuthErrorMsg('');
                try { await auth.currentUser.reload(); if (auth.currentUser.emailVerified) setAuthStep('enroll_phone'); else setAuthErrorMsg("まだメールの確認が完了していません。"); } catch (error) { handleLogout(); }

            };

            const startMfaEnrollment = async (e) => {
                e.preventDefault(); setAuthErrorMsg('');
                try {
                    const formattedPhone = formatPhoneNumber(phoneNumber);
                    if (formattedPhone === '+819000000000') { setVerificationId('dummy'); setAuthStep('verify_enroll'); return; }
                    setupRecaptcha();
                    const user = auth.currentUser; const session = await multiFactor(user).getSession();
                    const phoneInfoOptions = { phoneNumber: formattedPhone, session };
                    const phoneAuthProvider = new PhoneAuthProvider(auth);
                    const vId = await phoneAuthProvider.verifyPhoneNumber(phoneInfoOptions, window.recaptchaVerifier);

                                                            <div><label className="block text-sm font-medium text-slate-700 mb-1">1. 最近の健康状態について（症状・体調面など）</label><textarea name="report_health" value={formData.report_health || ''} onChange={handleInputChange} disabled={!canEdit3} className="w-full p-3 border border-slate-300 rounded-md bg-white h-24 disabled:bg-slate-100 disabled:text-slate-500 outline-none focus:ring-2 focus:ring-blue-500"></textarea></div>
                                                            <div><label className="block text-sm font-medium text-slate-700 mb-1">2. 主治医の先生のコメント（症状回復の程度、職場復帰の見通しなど）</label><textarea name="report_doctor" value={formData.report_doctor || ''} onChange={handleInputChange} disabled={!canEdit3} className="w-full p-3 border border-slate-300 rounded-md bg-white h-24 disabled:bg-slate-100 disabled:text-slate-500 outline-none focus:ring-2 focus:ring-blue-500"></textarea></div>
                                                            <div>
                                                                <label className="block text-sm font-medium text-slate-700 mb-1">3. 復帰準備の開始希望</label>
                                                                <div className="flex gap-4">
                                                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="report_desire" value="prepare" checked={formData.report_desire === 'prepare'} onChange={handleInputChange} disabled={!canEdit3} className="w-4 h-4 text-blue-600 disabled:opacity-50"/><span className="text-slate-700 font-medium text-sm">復帰準備の開始を希望する</span></label>
                                                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="report_desire" value="rest" checked={formData.report_desire === 'rest'} onChange={handleInputChange} disabled={!canEdit3} className="w-4 h-4 text-blue-600 disabled:opacity-50"/><span className="text-slate-700 font-medium text-sm">引き続き療養に専念する</span></label>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="border border-slate-200 rounded-lg p-6">
                                                        <h4 className="font-bold text-slate-800 mb-3">Phase Ⅰ 達成項目チェックリスト</h4>
                                                        <div className="space-y-2">
                                                            {[
                                                                {id: 'p1_c1', label: '1. 職場復帰をしたいと考えている'}, {id: 'p1_c2', label: '2. 復帰準備を開始することについて、主治医は同意している'}, {id: 'p1_c3', label: '3. 会社との連絡で、体調が悪化することはない'}, {id: 'p1_c4', label: '4. 体調は十分に回復している'}, {id: 'p1_c5', label: '5. 睡眠リズムが整っている（昼間の眠気がない状態）'}, {id: 'p1_c6', label: '6. 食事のリズム、回数、量などを正しくコントロールできている'}, {id: 'p1_c7', label: '7. 日中の外出・身体を動かす事に対して、億劫感はない'}, {id: 'p1_c8', label: '8. 新聞や書籍など、活字を読む事に対して、億劫感はない'}, {id: 'p1_c9', label: '9. 定期受診をきちんとしており、何かあれば主治医に相談できる'}, {id: 'p1_c10', label: '10. 主治医の指示通りに療養している（薬など）'}
                                                            ].map(item => (
                                                                <label key={item.id} className="flex items-start gap-3 p-2 hover:bg-slate-50 rounded cursor-pointer"><input type="checkbox" name={item.id} checked={formData[item.id] || false} onChange={handleCheckboxChange} disabled={!canEdit3} className="mt-1 w-4 h-4 text-blue-600 rounded border-slate-300 disabled:opacity-50"/><span className="text-slate-700 text-sm leading-tight">{item.label}</span></label>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </section>

                                                <section className="border-t-2 border-slate-100 pt-8 mt-8">
                                                    <h3 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2"><span className="w-2 h-6 bg-emerald-500 rounded-full"></span>【Phase II】 復帰準備・書類提出 (本人入力)</h3>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4">
                                                        <div className="border border-slate-200 rounded-lg p-6 bg-slate-50"><h4 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><FileText className="w-5 h-5 text-slate-600"/> 生活記録表</h4><p className="text-xs text-slate-500 mb-4">2週間分を記録し提出してください。</p><div className={`border-2 border-dashed border-slate-300 rounded-lg p-6 text-center transition-colors ${canEdit3 ? 'hover:bg-white cursor-pointer bg-slate-100' : 'bg-slate-200 opacity-50'}`}><Upload className="w-6 h-6 text-slate-400 mx-auto mb-2" /><span className="text-sm text-slate-500 font-medium">生活記録表をアップロード</span></div></div>
                                                        <div className="border border-slate-200 rounded-lg p-6 bg-slate-50"><h4 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><FileText className="w-5 h-5 text-slate-600"/> 主治医意見書</h4><p className="text-xs text-slate-500 mb-4">復帰可能の意見が記載されているものを提出してください。</p><div className={`border-2 border-dashed border-slate-300 rounded-lg p-6 text-center transition-colors ${canEdit3 ? 'hover:bg-white cursor-pointer bg-slate-100' : 'bg-slate-200 opacity-50'}`}><Upload className="w-6 h-6 text-slate-400 mx-auto mb-2" /><span className="text-sm text-slate-500 font-medium">主治医意見書をアップロード</span></div></div>
                                                    </div>
                                                    <div className="border border-slate-200 rounded-lg p-6">
                                                        <h4 className="font-bold text-slate-800 mb-3">Phase Ⅱ 達成項目チェックリスト</h4>
                                                        <div className="space-y-2">
                                                            {[
                                                                {id: 'p2_c1', label: '1. いつでも職場復帰できる状態である'}, {id: 'p2_c2', label: '2. 主治医との連携ができている（復帰への同意、注意点の相談など）'}, {id: 'p2_c3', label: '3. 生活リズムは就業に支障がでない状態で安定している（睡眠・起床・活動）'}, {id: 'p2_c4', label: '4. 職場復帰の準備をしていても、体調が悪化することはない'}, {id: 'p2_c5', label: '5. 職場復帰の基準を理解している（週5日フルタイム、本来の期待役割）'}, {id: 'p2_c6', label: '6. 仕事の負荷に対応した自己管理を行えるよう準備をしている'}, {id: 'p2_c7', label: '7. 復帰に向け、療養中に出来ることを行い、復帰に備えている'}, {id: 'p2_c8', label: '8. 通勤時間帯に、会社近くまで来ても問題なく、安全に通勤できる'}, {id: 'p2_c9', label: '9. 復帰後、職制・同僚との関わりにおいて、不安な点はない'}, {id: 'p2_c10', label: '10. 復帰後、体調が変化した時の対処がイメージできている'}
                                                            ].map(item => (
                                                                <label key={item.id} className="flex items-start gap-3 p-2 hover:bg-slate-50 rounded cursor-pointer"><input type="checkbox" name={item.id} checked={formData[item.id] || false} onChange={handleCheckboxChange} disabled={!canEdit3} className="mt-1 w-4 h-4 text-blue-600 rounded border-slate-300 disabled:opacity-50"/><span className="text-slate-700 text-sm leading-tight">{item.label}</span></label>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </section>

                                                <section className="border-t-2 border-slate-100 pt-8 mt-8 space-y-6">
                                                    <h3 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2"><span className="w-2 h-6 bg-yellow-500 rounded-full"></span>【Phase II 後半】 復帰直前の最終確認 (職制・専門職)</h3>
                                                    {currentRole === 'employee' ? (
                                                        <div className="bg-slate-50 p-6 rounded-lg border border-slate-200 text-center"><Lock className="w-8 h-8 text-slate-300 mx-auto mb-2"/><p className="text-sm text-slate-500 font-medium">現在、提出された書類をもとに職制・専門職が最終確認を行っています。</p></div>
                                                    ) : (
                                                        <>
                                                            <div className={`border rounded-lg p-6 shadow-sm ${canEdit('manager') && actualPhase === 3 ? 'bg-white border-yellow-300' : 'bg-slate-50 border-slate-200 opacity-80'}`}>
                                                                <h4 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><Briefcase className="w-5 h-5 text-indigo-600"/> 職制回答: 試し出勤・配慮措置の受け入れ可否</h4>
                                                                <p className="text-xs text-slate-500 mb-4">主治医意見や本人の状態を踏まえ、現場として短時間勤務や業務制限の受け入れは現実的に可能ですか？</p>
                                                                <div className="flex gap-4">
                                                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="mgr_accept_short_time" value="yes" checked={formData.mgr_accept_short_time === 'yes'} onChange={handleInputChange} disabled={!canEdit('manager') || actualPhase > 3} className="w-4 h-4 text-indigo-600 disabled:opacity-50"/><span className="text-slate-700 font-medium text-sm">受け入れ可能 (配慮事項に対応できる)</span></label>
                                                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="mgr_accept_short_time" value="no" checked={formData.mgr_accept_short_time === 'no'} onChange={handleInputChange} disabled={!canEdit('manager') || actualPhase > 3} className="w-4 h-4 text-indigo-600 disabled:opacity-50"/><span className="text-slate-700 font-medium text-sm">受け入れ困難 (現場の体制的に厳しい)</span></label>
                                                                </div>
                                                            </div>
                                                            <div className={`border rounded-lg p-6 shadow-sm ${canEdit('ohp') && actualPhase === 3 ? 'bg-white border-yellow-300' : 'bg-slate-50 border-slate-200 opacity-80'}`}>
                                                                <h4 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><HeartPulse className="w-5 h-5 text-red-500"/> 専門職回答: 主治医意見の妥当性確認</h4>
                                                                <div className="flex flex-col gap-3 mb-6">
                                                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="ohp_medical_opinion_check" value="agree" checked={formData.ohp_medical_opinion_check === 'agree'} onChange={handleInputChange} disabled={!canEdit('ohp') || actualPhase > 3} className="w-4 h-4 text-red-600 disabled:opacity-50"/><span className="text-slate-700 font-medium text-sm">同意する (主治医の復帰可意見は妥当)</span></label>
                                                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="ohp_medical_opinion_check" value="pending" checked={formData.ohp_medical_opinion_check === 'pending'} onChange={handleInputChange} disabled={!canEdit('ohp') || actualPhase > 3} className="w-4 h-4 text-red-600 disabled:opacity-50"/><span className="text-slate-700 font-medium text-sm">保留 (主治医との連携・追加情報収集が必要)</span></label>
                                                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="ohp_medical_opinion_check" value="disagree" checked={formData.ohp_medical_opinion_check === 'disagree'} onChange={handleInputChange} disabled={!canEdit('ohp') || actualPhase > 3} className="w-4 h-4 text-red-600 disabled:opacity-50"/><span className="text-slate-700 font-medium text-sm">否認 (まだ復帰できる状態ではない)</span></label>
                                                                </div>
                                                                <h4 className="font-bold text-slate-800 mb-2 flex items-center gap-2 border-t border-slate-200 pt-4"><CheckCircle className="w-5 h-5 text-purple-600"/> 産業医: 就業上の措置に関する最終判定</h4>
                                                                <div className="flex flex-col gap-3">
                                                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="doctor_final_judgment" value="normal" checked={formData.doctor_final_judgment === 'normal'} onChange={handleInputChange} disabled={!canEdit('ohp') || actualPhase > 3} className="w-4 h-4 text-purple-600 disabled:opacity-50"/><span className="text-slate-700 font-bold text-sm">① 通常就業可 (制限・配慮なし)</span></label>
                                                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="doctor_final_judgment" value="restricted" checked={formData.doctor_final_judgment === 'restricted'} onChange={handleInputChange} disabled={!canEdit('ohp') || actualPhase > 3} className="w-4 h-4 text-purple-600 disabled:opacity-50"/><span className="text-slate-700 font-bold text-sm">② 就業制限・配慮が必要 (条件付き就業可)</span></label>
                                                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="doctor_final_judgment" value="impossible" checked={formData.doctor_final_judgment === 'impossible'} onChange={handleInputChange} disabled={!canEdit('ohp') || actualPhase > 3} className="w-4 h-4 text-purple-600 disabled:opacity-50"/><span className="text-slate-700 font-bold text-sm text-red-600">③ 就業不可 (療養継続)</span></label>
                                                                </div>
                                                            </div>
                                                        </>
                                                    )}
                                                </section>

                                                {actualPhase === 3 && (canEdit('employee') || canEdit('manager') || canEdit('ohp') || isAdmin) && (
                                                    <div className="flex justify-between items-center mt-8 pt-6 border-t border-slate-100">
                                                        <button onClick={() => saveData({})} className="px-6 py-2 border border-slate-300 text-slate-600 rounded-md hover:bg-slate-50 font-medium">途中保存</button>
                                                        {(canEdit('admin') || canEdit('ohp')) && <button onClick={() => saveData({ phase: 4 })} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-md shadow-sm flex items-center gap-2">復帰面談・就労支援期 (Phase Ⅲ) へ進む <ChevronRight className="w-5 h-5"/></button>}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {}
                                {currentPhase === 4 && (
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 animate-fade-in-up">
                                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800 border-b pb-3"><span className="bg-blue-600 text-white px-3 py-1 rounded-md text-sm">Phase Ⅲ</span> 就労支援期 (フォローシート)</h2>
                                        <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-8"><p className="text-blue-900 text-sm font-medium">復帰後の面談用のフォローシートです。本人と職制それぞれが客観的に5段階評価を行い、認識のすり合わせを行います。（1: 非常に問題 〜 5: 全く問題ない）</p></div>

                                        <div className="space-y-6">
                                            {[
                                                { id: 'q1', title: '① 安全上の問題がある、もしくは、起こす不安があるか (ヒヤリハット等)' },
                                                { id: 'q2', title: '② 健康上の理由による欠勤、突発年休、遅刻早退なく勤務できているか' },
                                                { id: 'q3', title: '③ パフォーマンスの回復度合い (本来の職能を5とする)' }
                                            ].map((q) => (
                                                <div key={q.id} className="border border-slate-200 rounded-lg overflow-hidden shadow-sm">
                                                    <div className="bg-slate-50 p-3 border-b border-slate-200 font-bold text-slate-800 text-sm">{q.title}</div>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-slate-200">
                                                        <div className={`p-4 ${canEditEmp4 ? 'bg-blue-50/50' : 'bg-slate-50 opacity-80'}`}>
                                                            <div className="text-sm font-bold text-blue-800 mb-3 flex items-center gap-1"><User className="w-4 h-4"/>本人評価</div>
                                                            <div className="flex justify-between px-2">
                                                                {[1, 2, 3, 4, 5].map(score => (
                                                                    <label key={`emp_${q.id}_${score}`} className="flex flex-col items-center gap-1 cursor-pointer"><input type="radio" name={`emp_${q.id}`} value={score} checked={String(formData[`emp_${q.id}`]) === String(score)} onChange={handleInputChange} disabled={!canEditEmp4} className="w-5 h-5 text-blue-600 focus:ring-blue-500 disabled:opacity-50"/><span className="text-xs text-slate-600 font-medium">{score}</span></label>
                                                                ))}
                                                            </div>
                                                        </div>
                                                        <div className={`p-4 ${canEditMgr4 ? 'bg-emerald-50/50' : 'bg-slate-50 opacity-80'}`}>
                                                            <div className="text-sm font-bold text-emerald-800 mb-3 flex items-center gap-1"><Briefcase className="w-4 h-4"/>職制評価</div>
                                                            <div className="flex justify-between px-2">
                                                                {[1, 2, 3, 4, 5].map(score => (
                                                                    <label key={`mgr_${q.id}_${score}`} className="flex flex-col items-center gap-1 cursor-pointer"><input type="radio" name={`mgr_${q.id}`} value={score} checked={String(formData[`mgr_${q.id}`]) === String(score)} onChange={handleInputChange} disabled={!canEditMgr4} className="w-5 h-5 text-emerald-600 focus:ring-emerald-500 disabled:opacity-50"/><span className="text-xs text-slate-600 font-medium">{score}</span></label>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                                                <div><label className="block text-sm font-bold text-blue-800 mb-2 flex items-center gap-1"><User className="w-4 h-4"/>本人の気になっている点・相談</label><textarea name="emp_comment" value={formData.emp_comment || ''} onChange={handleInputChange} disabled={!canEditEmp4} className={`w-full p-3 border rounded-md h-32 ${canEditEmp4 ? 'bg-white border-blue-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none' : 'bg-slate-100 border-slate-200 text-slate-500'}`}></textarea></div>
                                                <div><label className="block text-sm font-bold text-emerald-800 mb-2 flex items-center gap-1"><Briefcase className="w-4 h-4"/>職制の気になっている点・相談</label><textarea name="mgr_comment" value={formData.mgr_comment || ''} onChange={handleInputChange} disabled={!canEditMgr4} className={`w-full p-3 border rounded-md h-32 ${canEditMgr4 ? 'bg-white border-emerald-300 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none' : 'bg-slate-100 border-slate-200 text-slate-500'}`}></textarea></div>
                                            </div>

                                            {actualPhase === 4 && (canEdit('employee') || canEdit('manager') || canEdit('ohp') || isAdmin) && (
                                                <div className="flex justify-between items-center mt-8 pt-6 border-t border-slate-100">
                                                    <button onClick={() => saveData({})} className="px-6 py-2 border border-slate-300 text-slate-600 rounded-md hover:bg-slate-50 font-medium">途中保存</button>
                                                    {(isAdmin || canEdit('manager') || canEdit('ohp')) && (
                                                        <button onClick={() => saveData({ phase: 5 })} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-md shadow-sm flex items-center gap-2">就業支援プログラムを完了する <Check className="w-5 h-5"/></button>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {actualPhase === 5 && currentPhase === 5 && (
                                    <div className="bg-white p-12 rounded-xl shadow-sm border border-slate-200 text-center animate-fade-in-up">
                                        <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-100 mb-6"><CheckCircle className="w-10 h-10 text-green-600" /></div>
                                        <h2 className="text-2xl font-bold text-slate-800 mb-4">就業支援プログラム 完了</h2>
                                        <p className="text-slate-600 mb-8 max-w-lg mx-auto">通常業務への復帰が確認されました。今後のご活躍と、健康の維持をお祈りしております。体調に変化があった場合は、いつでも職制または健康支援センターへご相談ください。</p>
                                        {currentRole !== 'employee' && <button onClick={() => setCurrentView('dashboard')} className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 px-6 rounded-md shadow-sm transition-colors">ダッシュボードへ戻る</button>}
                                    </div>
                                )}

                                {}
                                {(isAdmin || currentRole === 'ohp') && (
                                    <div className="mt-8 bg-amber-50 rounded-xl p-6 shadow-sm border border-amber-200 border-l-4 border-l-amber-500 animate-fade-in-up">
                                        <h3 className="text-amber-900 font-bold mb-2 flex items-center gap-2"><Lock className="w-5 h-5 text-amber-600" /> 専門職専用 対応履歴 / 面談メモ（非公開）</h3>
                                        <p className="text-amber-700 text-xs mb-4">この入力欄は本人および職制（上司）には表示されません。産業保健スタッフ間の情報共有として使用してください。</p>
                                        <textarea name="ohp_secret_memo" value={formData.ohp_secret_memo || ''} onChange={handleInputChange} placeholder="例: 〇月〇日 本人と面談。睡眠状況は改善傾向にあるが、朝の倦怠感が残っているとのこと。次回〇日に再度面談予定。" className="w-full p-4 border border-amber-300 rounded-md bg-white text-slate-800 h-40 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none placeholder-slate-400 shadow-inner"></textarea>
                                        <div className="flex justify-end mt-4"><button onClick={() => saveData({})} className="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-6 rounded-md shadow-sm transition-colors">メモを保存</button></div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<HealthSupportPortal />);
    </script>
</body>
</html>
