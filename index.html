<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私傷病・就業支援ポータル</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: { 'fade-in-up': 'fadeInUp 0.4s ease-out forwards' },
                    keyframes: {
                        fadeInUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>

    <!-- React, Babel, Firebase -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.300.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
        }
    }
    </script>
    <style>
        #root:empty { min-height: 100vh; background-color: #f8fafc; display: flex; align-items: center; justify-content: center; }
        #root:empty::after { content: "読み込み中..."; color: #64748b; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Upload, FileText, CheckCircle, Clock, ChevronRight, ChevronLeft, User, Briefcase, HeartPulse, Shield, LogOut, Lock, Check, Activity, AlertTriangle, Info } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, doc, setDoc, onSnapshot } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyDHqkBNSSsakVwHxKdWZ4hNoSM9wORbLR4",
            authDomain: "health-support-portal.firebaseapp.com",
            projectId: "health-support-portal",
            storageBucket: "health-support-portal.firebasestorage.app",
            messagingSenderId: "71602892006",
            appId: "1:71602892006:web:c99fe5343191e65a2fdf27",
            measurementId: "G-FED2KDFGJ7"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const ROLES = [
            { id: 'admin', label: 'システム管理者', icon: Lock },
            { id: 'employee', label: '従業員 (本人)', icon: User },
            { id: 'manager', label: '職制 (上司)', icon: Briefcase },
            { id: 'ohp', label: '保健師/産業医', icon: HeartPulse }
        ];

        const PHASES = [
            { id: 0, title: '発生報告', desc: '本人の報告' },
            { id: 1, title: '職制確認', desc: '上司の状況評価' },
            { id: 2, title: '自動判定・最終決定', desc: 'システム判定と専門職判断' },
            { id: 3, title: '就業支援プログラム', desc: '療養〜復帰〜就労支援' },
            { id: 4, title: '完了', desc: '通常復帰' }
        ];

        function HealthSupportPortal() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentRole, setCurrentRole] = useState('employee');
            const [currentView, setCurrentView] = useState('detail'); 
            const [currentPhase, setCurrentPhase] = useState(0);
            const [formData, setFormData] = useState({ pgStep: 1 });
            const [cases, setCases] = useState([]); 

            useEffect(() => {
                const unsubscribe = onSnapshot(collection(db, "cases"), (snapshot) => {
                    const casesData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setCases(casesData);
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = (roleId) => {
                setCurrentRole(roleId);
                setIsLoggedIn(true);
                if (roleId === 'employee') {
                    setCurrentView('detail');
                    setFormData({ id: `emp_${Date.now()}`, pgStep: 1 }); 
                    setCurrentPhase(0);
                } else {
                    setCurrentView('dashboard');
                }
            };

            const openCase = (caseData) => {
                setFormData({ pgStep: 1, ...caseData });
                setCurrentPhase(caseData.phase || 0);
                setCurrentView('detail');
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };
            
            const handleCheckboxChange = (e) => {
                const { name, checked } = e.target;
                setFormData(prev => ({ ...prev, [name]: checked }));
            };

            const canEdit = (role) => currentRole === 'admin' || currentRole === role;
            const isAdmin = currentRole === 'admin';

            const evaluatePrimaryJudgment = (data) => {
                let level = 0;
                let reasons = [];

                if(data.mgr_acceptance_concern === 'yes') { level = Math.max(level, 3); reasons.push('職制が復帰後の受け入れ体制に不安を感じている'); }
                if(data.req_accommodation === 'yes' && data.mgr_needs_accommodation === 'no') { level = Math.max(level, 3); reasons.push('配慮に関する本人と職制の認識相違'); }

                if(data.doctor_restriction === 'yes') { level = Math.max(level, 2); reasons.push('主治医からの就業制限(診断書)あり'); }
                if(data.has_work_restriction === 'yes') { level = Math.max(level, 2); reasons.push('危険作業・夜勤・運転などの業務に影響・制限あり'); }
                if(data.leave_duration === 'long') { level = Math.max(level, 2); reasons.push('休業期間が一定以上（長期）'); }

                if(data.has_medical_cert === 'yes') { level = Math.max(level, 1); reasons.push('診断書の提出あり'); }
                if(data.req_ohp === 'yes') { level = Math.max(level, 1); reasons.push('本人が保健師・産業医面談を希望'); }
                if(data.mgr_safety_concern === 'yes') { level = Math.max(level, 1); reasons.push('職制が業務上の安全面に不安を感じている'); }
                if(data.req_accommodation === 'yes' || data.mgr_needs_accommodation === 'yes') { level = Math.max(level, 1); reasons.push('就業上の配慮や調整が必要'); }

                if(level === 0) {
                    reasons.push('休業期間が短く、勤務制限や不安要素がないため通常勤務可能');
                }

                return { sys_level: level, sys_reasons: reasons };
            };

            const saveData = async (extraData = {}) => {
                let newData = { ...formData, ...extraData };
                
                if (currentPhase === 1 && extraData.phase === 2) {
                    const judgment = evaluatePrimaryJudgment(newData);
                    newData = { ...newData, ...judgment };
                }

                setFormData(newData);
                if (extraData.phase !== undefined) setCurrentPhase(extraData.phase);

                try {
                    if (newData.id) await setDoc(doc(db, "cases", newData.id), newData, { merge: true });
                } catch (error) { console.error("保存エラー:", error); }
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100">
                            <div className="text-center mb-8">
                                <HeartPulse className="h-12 w-12 text-blue-600 mx-auto mb-3" />
                                <h1 className="text-2xl font-bold text-slate-800">就業支援プログラム<br/>ポータル</h1>
                                <p className="text-slate-500 mt-2 text-sm">ログインする役割（ロール）を選択してください。</p>
                            </div>
                            <div className="space-y-4">
                                {ROLES.map(role => (
                                    <button key={role.id} onClick={() => handleLogin(role.id)} className="w-full flex items-center justify-between p-4 border border-slate-200 rounded-lg hover:border-blue-500 hover:bg-blue-50 transition-all group">
                                        <div className="flex items-center gap-3">
                                            <div className="bg-slate-100 p-2 rounded-md group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors">
                                                <role.icon className="w-5 h-5 text-slate-600 group-hover:text-blue-600" />
                                            </div>
                                            <span className="font-bold text-slate-700">{role.label}</span>
                                        </div>
                                        <ChevronRight className="w-5 h-5 text-slate-400 group-hover:text-blue-500" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            const RoleIcon = ROLES.find(r => r.id === currentRole)?.icon || User;

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 pb-20">
                    <header className="bg-blue-900 text-white shadow-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center flex-wrap gap-4">
                            <div className="flex items-center gap-2">
                                <HeartPulse className="h-6 w-6 text-red-400" />
                                <h1 className="text-xl font-bold tracking-wider">就業支援ポータル</h1>
                            </div>
                            <div className="flex items-center gap-4 text-sm bg-blue-800 py-1 px-3 rounded-lg border border-blue-700">
                                <div className="flex items-center gap-2 text-blue-100 pr-4 border-r border-blue-700">
                                    <RoleIcon className="w-4 h-4" />
                                    <span className="font-bold">{ROLES.find(r => r.id === currentRole)?.label}</span>
                                </div>
                                <button onClick={() => setIsLoggedIn(false)} className="flex items-center gap-1 text-white hover:text-red-300 transition-colors"><LogOut className="w-4 h-4" /> ログアウト</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-8">
                        {currentView === 'dashboard' ? (
                            <div className="animate-fade-in-up">
                                <h2 className="text-2xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                                    <Briefcase className="w-6 h-6 text-blue-600" /> 対応中の従業員一覧
                                </h2>
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    {cases.length === 0 ? (
                                        <div className="p-8 text-center text-slate-500">現在、対応中のデータはありません。</div>
                                    ) : (
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left whitespace-nowrap">
                                                <thead className="bg-slate-50 border-b border-slate-200">
                                                    <tr>
                                                        <th className="p-4 font-bold text-slate-700">社員番号</th>
                                                        <th className="p-4 font-bold text-slate-700">氏名</th>
                                                        <th className="p-4 font-bold text-slate-700">現在のステータス</th>
                                                        <th className="p-4 font-bold text-slate-700 text-center">アクション</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {cases.map(c => (
                                                        <tr key={c.id} className="hover:bg-blue-50">
                                                            <td className="p-4 text-slate-600">{c.empId || '未入力'}</td>
                                                            <td className="p-4 font-bold text-slate-800">{c.name || '未入力'}</td>
                                                            <td className="p-4">
                                                                <span className="bg-blue-100 text-blue-800 text-xs px-3 py-1 rounded-full font-bold border border-blue-200">
                                                                    {c.phase === 4 ? '完了' : PHASES[c.phase || 0]?.title}
                                                                </span>
                                                            </td>
                                                            <td className="p-4 text-center">
                                                                <button onClick={() => openCase(c)} className="bg-white border border-blue-600 text-blue-600 hover:bg-blue-600 hover:text-white px-4 py-1.5 rounded-md text-sm font-bold shadow-sm">詳細を開く</button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="animate-fade-in-up">
                                {}
                                <div className="bg-white px-6 py-4 rounded-xl shadow-sm border border-slate-200 mb-8 flex items-center justify-between sticky top-[68px] z-40">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-blue-100 p-3 rounded-full hidden sm:block"><User className="w-6 h-6 text-blue-600" /></div>
                                        <div>
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="text-sm text-slate-500 font-medium">社員番号: {formData.empId || '未入力'}</span>
                                            </div>
                                            <h2 className="text-xl font-bold text-slate-800">{formData.name || '氏名未設定 (新規申請)'}</h2>
                                        </div>
                                    </div>
                                    {currentRole !== 'employee' && (
                                        <button onClick={() => setCurrentView('dashboard')} className="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-bold flex items-center gap-1"><ChevronLeft className="w-4 h-4"/> 一覧へ戻る</button>
                                    )}
                                </div>

                                {}
                                <div className="mb-10">
                                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                                        <Clock className="w-5 h-5 text-slate-500" /> 現在のステータス: {PHASES[currentPhase]?.title}
                                    </h2>
                                    <div className="relative pt-1">
                                        <div className="overflow-hidden h-2 mb-4 text-xs flex rounded bg-slate-200">
                                            <div style={{ width: `${(currentPhase / 4) * 100}%` }} className="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-blue-500 transition-all duration-500"></div>
                                        </div>
                                        <div className="flex justify-between text-xs font-medium text-slate-500 px-1">
                                            {PHASES.map(p => (
                                                <div key={p.id} className={`flex flex-col items-center ${currentPhase >= p.id ? 'text-blue-600 font-bold' : ''}`}>
                                                    <span className="hidden sm:inline">{p.title}</span><span className="sm:hidden">{p.id}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {}
                                {currentPhase === 0 && (
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800 border-b pb-3">
                                            <FileText className="w-6 h-6 text-blue-600" /> Phase 0: 私傷病発生報告（本人入力）
                                        </h2>
                                        {canEdit('employee') ? (
                                            <div className="space-y-8">
                                                <section>
                                                    <h3 className="text-lg font-bold mb-4 text-slate-700">基本情報</h3>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50 p-4 rounded-lg border border-slate-200">
                                                        <div><label className="block text-sm font-medium mb-1">氏名</label><input type="text" name="name" value={formData.name || ''} onChange={handleInputChange} className="w-full p-2 border rounded-md" placeholder="山田 太郎"/></div>
                                                        <div><label className="block text-sm font-medium mb-1">社員番号</label><input type="text" name="empId" value={formData.empId || ''} onChange={handleInputChange} className="w-full p-2 border rounded-md" placeholder="10001"/></div>
                                                    </div>
                                                </section>
                                                <section>
                                                    <h3 className="text-lg font-bold mb-4 text-slate-700">A. 発生状況</h3>
                                                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 space-y-4">
                                                        <div>
                                                            <label className="block text-sm font-medium mb-1">現在の勤務状況</label>
                                                            <select name="current_status" value={formData.current_status || ''} onChange={handleInputChange} className="w-full p-2 border rounded-md bg-white">
                                                                <option value="">選択してください</option>
                                                                <option value="working">出勤中（休業なし）</option>
                                                                <option value="leave">休業中</option>
                                                                <option value="return_soon">近々復帰予定</option>
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm font-medium mb-1">休業期間（見込み含む）</label>
                                                            <select name="leave_duration" value={formData.leave_duration || ''} onChange={handleInputChange} className="w-full p-2 border rounded-md bg-white">
                                                                <option value="">選択してください</option>
                                                                <option value="none">休業なし</option>
                                                                <option value="short">短期間（1週間未満）</option>
                                                                <option value="medium">中期間（1週間〜1ヶ月未満）</option>
                                                                <option value="long">長期間（1ヶ月以上）</option>
                                                            </select>
                                                        </div>
                                                        <div className="flex gap-4 items-center">
                                                            <label className="text-sm font-medium w-48">診断書の提出:</label>
                                                            <label><input type="radio" name="has_medical_cert" value="yes" checked={formData.has_medical_cert === 'yes'} onChange={handleInputChange} className="mr-1"/>あり</label>
                                                            <label><input type="radio" name="has_medical_cert" value="no" checked={formData.has_medical_cert === 'no'} onChange={handleInputChange} className="mr-1"/>なし</label>
                                                        </div>
                                                    </div>
                                                </section>
                                                <section>
                                                    <h3 className="text-lg font-bold mb-4 text-slate-700">B. 勤務への影響</h3>
                                                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 space-y-4 text-sm">
                                                        <div className="flex justify-between items-center border-b pb-2">
                                                            <span>主治医から勤務制限の指示はありますか？</span>
                                                            <div className="flex gap-4"><label><input type="radio" name="doctor_restriction" value="yes" checked={formData.doctor_restriction === 'yes'} onChange={handleInputChange} className="mr-1"/>はい</label><label><input type="radio" name="doctor_restriction" value="no" checked={formData.doctor_restriction === 'no'} onChange={handleInputChange} className="mr-1"/>いいえ</label></div>
                                                        </div>
                                                        <div className="flex justify-between items-center border-b pb-2">
                                                            <span>危険作業・夜勤・交替勤務・運転業務に影響や制限はありますか？</span>
                                                            <div className="flex gap-4"><label><input type="radio" name="has_work_restriction" value="yes" checked={formData.has_work_restriction === 'yes'} onChange={handleInputChange} className="mr-1"/>はい</label><label><input type="radio" name="has_work_restriction" value="no" checked={formData.has_work_restriction === 'no'} onChange={handleInputChange} className="mr-1"/>いいえ</label></div>
                                                        </div>
                                                    </div>
                                                </section>
                                                <section>
                                                    <h3 className="text-lg font-bold mb-4 text-slate-700">C. 本人の希望</h3>
                                                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 space-y-4 text-sm">
                                                        <div className="flex justify-between items-center border-b pb-2">
                                                            <span>保健師・産業医への相談・面談を希望しますか？</span>
                                                            <div className="flex gap-4"><label><input type="radio" name="req_ohp" value="yes" checked={formData.req_ohp === 'yes'} onChange={handleInputChange} className="mr-1"/>はい</label><label><input type="radio" name="req_ohp" value="no" checked={formData.req_ohp === 'no'} onChange={handleInputChange} className="mr-1"/>いいえ</label></div>
                                                        </div>
                                                        <div className="flex justify-between items-center border-b pb-2">
                                                            <span>職場に対して、就業上の配慮や調整を希望しますか？</span>
                                                            <div className="flex gap-4"><label><input type="radio" name="req_accommodation" value="yes" checked={formData.req_accommodation === 'yes'} onChange={handleInputChange} className="mr-1"/>はい</label><label><input type="radio" name="req_accommodation" value="no" checked={formData.req_accommodation === 'no'} onChange={handleInputChange} className="mr-1"/>いいえ</label></div>
                                                        </div>
                                                    </div>
                                                </section>
                                                <div className="flex justify-center mt-8">
                                                    <button onClick={() => saveData({ phase: 1 })} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-md flex items-center gap-2 transition-transform hover:scale-105">
                                                        職制確認へ進む <ChevronRight className="w-5 h-5"/>
                                                    </button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="text-center p-12 bg-slate-50 rounded-xl border border-slate-200">
                                                <Clock className="w-12 h-12 text-slate-300 mx-auto mb-4" />
                                                <h3 className="text-xl font-bold text-slate-700 mb-2">本人による申請待ち</h3>
                                                <p className="text-slate-500">現在、対象の従業員が休業報告および基本情報を入力中です。</p>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {}
                                {currentPhase === 1 && (
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800 border-b pb-3">
                                            <Briefcase className="w-6 h-6 text-emerald-600" /> Phase 1: 職制確認（上司入力）
                                        </h2>
                                        {canEdit('manager') ? (
                                            <div className="space-y-8">
                                                <div className="bg-emerald-50 border-l-4 border-emerald-500 p-4 mb-6">
                                                    <p className="text-emerald-900 text-sm font-medium">本人の報告内容を踏まえ、職場の受け入れ体制や安全面についての一次評価を入力してください。この結果をもとにシステムが自動判定を行います。</p>
                                                </div>
                                                <div className="bg-slate-50 p-6 rounded-lg border border-slate-200 space-y-6 text-sm">
                                                    <div className="flex flex-col gap-2 border-b pb-4">
                                                        <span className="font-bold text-slate-800">Q1. 業務上の安全面（事故やケガのリスクなど）で不安はありますか？</span>
                                                        <div className="flex gap-6 mt-1"><label className="cursor-pointer"><input type="radio" name="mgr_safety_concern" value="yes" checked={formData.mgr_safety_concern === 'yes'} onChange={handleInputChange} className="mr-2"/>はい（不安がある）</label><label className="cursor-pointer"><input type="radio" name="mgr_safety_concern" value="no" checked={formData.mgr_safety_concern === 'no'} onChange={handleInputChange} className="mr-2"/>いいえ（問題ない）</label></div>
                                                    </div>
                                                    <div className="flex flex-col gap-2 border-b pb-4">
                                                        <span className="font-bold text-slate-800">Q2. 本人の復帰にあたり、配置や業務内容などの「勤務配慮」が必要だと思いますか？</span>
                                                        <div className="flex gap-6 mt-1"><label className="cursor-pointer"><input type="radio" name="mgr_needs_accommodation" value="yes" checked={formData.mgr_needs_accommodation === 'yes'} onChange={handleInputChange} className="mr-2"/>はい（必要）</label><label className="cursor-pointer"><input type="radio" name="mgr_needs_accommodation" value="no" checked={formData.mgr_needs_accommodation === 'no'} onChange={handleInputChange} className="mr-2"/>いいえ（不要）</label></div>
                                                    </div>
                                                    <div className="flex flex-col gap-2">
                                                        <span className="font-bold text-slate-800">Q3. 復帰後の「職場の受け入れ体制」について不安はありますか？</span>
                                                        <div className="flex gap-6 mt-1"><label className="cursor-pointer"><input type="radio" name="mgr_acceptance_concern" value="yes" checked={formData.mgr_acceptance_concern === 'yes'} onChange={handleInputChange} className="mr-2"/>はい（不安がある）</label><label className="cursor-pointer"><input type="radio" name="mgr_acceptance_concern" value="no" checked={formData.mgr_acceptance_concern === 'no'} onChange={handleInputChange} className="mr-2"/>いいえ（問題ない）</label></div>
                                                    </div>
                                                </div>
                                                <div className="flex justify-between items-center mt-8 pt-6 border-t border-slate-100">
                                                    <button onClick={() => saveData({})} className="px-6 py-2 border border-slate-300 text-slate-600 rounded-md">途中保存</button>
                                                    <button onClick={() => saveData({ phase: 2 })} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-md flex items-center gap-2">自動判定を実行して次へ <ChevronRight className="w-5 h-5"/></button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="text-center p-12 bg-slate-50 rounded-xl border border-slate-200">
                                                <Clock className="w-12 h-12 text-slate-300 mx-auto mb-4" />
                                                <h3 className="text-xl font-bold text-slate-700 mb-2">職制による評価待ち</h3>
                                                <p className="text-slate-500">現在、対象の従業員の上司が状況確認と評価を入力中です。</p>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {}
                                {currentPhase === 2 && (
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800 border-b pb-3">
                                            <Activity className="w-6 h-6 text-purple-600" /> Phase 2: システム自動判定 ＆ 専門職判断
                                        </h2>
                                        
                                        {/* システム判定結果の表示 */}
                                        <div className={`p-6 rounded-xl border-2 mb-8 shadow-sm ${
                                            formData.sys_level === 3 ? 'bg-red-50 border-red-300' :
                                            formData.sys_level === 2 ? 'bg-orange-50 border-orange-300' :
                                            formData.sys_level === 1 ? 'bg-yellow-50 border-yellow-300' : 'bg-green-50 border-green-300'
                                        }`}>
                                            <div className="flex items-start gap-4">
                                                {formData.sys_level > 0 ? <AlertTriangle className={`w-8 h-8 mt-1 ${formData.sys_level === 3 ? 'text-red-500' : formData.sys_level === 2 ? 'text-orange-500' : 'text-yellow-500'}`}/> : <CheckCircle className="w-8 h-8 mt-1 text-green-500"/>}
                                                <div>
                                                    <div className="text-sm font-bold text-slate-500 mb-1">システム一次判定結果</div>
                                                    <h3 className={`text-2xl font-black mb-4 ${formData.sys_level === 3 ? 'text-red-700' : formData.sys_level === 2 ? 'text-orange-700' : formData.sys_level === 1 ? 'text-yellow-700' : 'text-green-700'}`}>
                                                        {formData.sys_level === 3 ? 'Level 3: 5者打合せ 要（就業支援PG検討）' :
                                                         formData.sys_level === 2 ? 'Level 2: 産業医面談 要' :
                                                         formData.sys_level === 1 ? 'Level 1: 保健師確認 要' : 'Level 0: 相談不要（通常復帰可）'}
                                                    </h3>
                                                    <div className="bg-white/60 p-4 rounded-lg border border-white/40">
                                                        <span className="text-sm font-bold text-slate-700 mb-2 block">判定の理由・根拠:</span>
                                                        <ul className="list-disc pl-5 space-y-1 text-slate-800 font-medium">
                                                            {formData.sys_reasons?.map((reason, idx) => (
                                                                <li key={idx}>{reason}</li>
                                                            ))}
                                                        </ul>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* 専門職による最終決定 */}
                                        {canEdit('ohp') ? (
                                            <div className="border border-slate-200 rounded-lg p-6 bg-slate-50">
                                                <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2">
                                                    <Shield className="w-5 h-5 text-purple-600"/> 専門職（保健師・産業医）による最終ルート決定
                                                </h3>
                                                <p className="text-sm text-slate-600 mb-6">一次判定結果と面談等を踏まえ、このケースの最終的な進行ルートを決定してください。</p>
                                                
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                    <button onClick={() => saveData({ phase: 4 })} className="p-4 border border-green-300 bg-green-50 hover:bg-green-100 rounded-lg text-center transition-colors shadow-sm">
                                                        <div className="font-bold text-green-800 text-lg mb-1">A. 通常復帰</div>
                                                        <div className="text-xs text-green-700">面談や配慮なしで復帰を許可し、フローを完了します。</div>
                                                    </button>
                                                    <button onClick={() => saveData({ phase: 4 })} className="p-4 border border-orange-300 bg-orange-50 hover:bg-orange-100 rounded-lg text-center transition-colors shadow-sm">
                                                        <div className="font-bold text-orange-800 text-lg mb-1">B. 条件付復帰</div>
                                                        <div className="text-xs text-orange-700">PGには乗せずに、一定の配慮のみをつけて復帰（完了）させます。</div>
                                                    </button>
                                                    <button onClick={() => saveData({ phase: 3 })} className="p-4 border border-blue-300 bg-blue-50 hover:bg-blue-100 rounded-lg text-center transition-colors shadow-sm">
                                                        <div className="font-bold text-blue-800 text-lg mb-1">C. 就業支援PGへ移行</div>
                                                        <div className="text-xs text-blue-700">長期支援が必要と判断し、療養・復帰準備・就労支援のPGへ進みます。</div>
                                                    </button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="text-center p-8 bg-slate-50 rounded-xl border border-slate-200">
                                                <Info className="w-8 h-8 text-blue-400 mx-auto mb-2" />
                                                <p className="text-slate-600 font-medium">現在、システムの一次判定結果をもとに、保健師・産業医が最終的な復帰ルートを判断しています。</p>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {}
                                {currentPhase === 3 && (
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800 border-b pb-3">
                                            <Shield className="w-6 h-6 text-blue-600" /> Phase 3: 就業支援プログラム
                                        </h2>
                                        
                                        {/* PG内の進行タブ */}
                                        <div className="flex border-b border-slate-200 mb-8">
                                            {[
                                                { id: 1, title: 'Ⅰ 療養専念期' },
                                                { id: 2, title: 'Ⅱ 復帰準備期' },
                                                { id: 3, title: 'Ⅲ 就労支援期 (復帰後)' }
                                            ].map(step => (
                                                <div key={step.id} className={`px-4 py-3 font-bold text-sm border-b-2 ${formData.pgStep === step.id ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400'} transition-colors`}>
                                                    {step.title}
                                                </div>
                                            ))}
                                        </div>

                                        {/* PG Step 1: 療養 */}
                                        {formData.pgStep === 1 && (
                                            <div className="animate-fade-in-up space-y-6">
                                                <div className="bg-blue-50 border-l-4 border-blue-500 p-4">
                                                    <p className="text-blue-900 text-sm font-medium">【療養専念期】治療・療養を最優先とする段階です。1ヶ月以上休業する場合は「療養状況報告書」を提出してください。</p>
                                                </div>
                                                <div className="border border-slate-200 rounded-lg p-6 bg-slate-50">
                                                    <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><FileText className="w-5 h-5 text-slate-600"/> 療養状況報告書</h3>
                                                    <div className="space-y-4">
                                                        <div><label className="block text-sm font-medium mb-1">健康状態について</label><textarea name="report_health" value={formData.report_health || ''} onChange={handleInputChange} disabled={!canEdit('employee')} className="w-full p-3 border rounded-md bg-white h-24"></textarea></div>
                                                        <div><label className="block text-sm font-medium mb-1">主治医のコメント</label><textarea name="report_doctor" value={formData.report_doctor || ''} onChange={handleInputChange} disabled={!canEdit('employee')} className="w-full p-3 border rounded-md bg-white h-24"></textarea></div>
                                                    </div>
                                                </div>
                                                <div className="flex justify-end">
                                                    <button onClick={() => saveData({ pgStep: 2 })} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md">復帰準備期 (Ⅱ) へ進む</button>
                                                </div>
                                            </div>
                                        )}

                                        {/* PG Step 2: 準備 */}
                                        {formData.pgStep === 2 && (
                                            <div className="animate-fade-in-up space-y-6">
                                                <div className="bg-blue-50 border-l-4 border-blue-500 p-4">
                                                    <p className="text-blue-900 text-sm font-medium">【復帰準備期】就業を想定した生活リズムの確立に取り組む段階です。生活記録表と主治医意見書を提出してください。</p>
                                                </div>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                    <div className="border border-slate-200 rounded-lg p-6 bg-slate-50 text-center"><Upload className="w-6 h-6 text-slate-400 mx-auto mb-2" /><span className="text-sm text-slate-500">生活記録表 アップロード</span></div>
                                                    <div className="border border-slate-200 rounded-lg p-6 bg-slate-50 text-center"><Upload className="w-6 h-6 text-slate-400 mx-auto mb-2" /><span className="text-sm text-slate-500">主治医意見書 アップロード</span></div>
                                                </div>
                                                <div className="flex justify-between">
                                                    <button onClick={() => saveData({ pgStep: 1 })} className="text-slate-500 hover:text-slate-700 font-medium px-4 py-2">戻る</button>
                                                    <button onClick={() => saveData({ pgStep: 3 })} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md">就労支援期 (Ⅲ) へ進む</button>
                                                </div>
                                            </div>
                                        )}

                                        {/* PG Step 3: フォローシート */}
                                        {formData.pgStep === 3 && (
                                            <div className="animate-fade-in-up space-y-6">
                                                <div className="bg-emerald-50 border-l-4 border-emerald-500 p-4">
                                                    <p className="text-emerald-900 text-sm font-medium">【就労支援期】復帰後のフォローシートです。本人と職制がそれぞれ5段階評価（5が良い）を入力し、産業医面談ですり合わせを行います。</p>
                                                </div>
                                                {[ { id: 'q1', title: '① 安全上の問題・不安' }, { id: 'q2', title: '② 安定した勤怠' }, { id: 'q3', title: '③ パフォーマンス回復度' } ].map((q) => (
                                                    <div key={q.id} className="border border-slate-200 rounded-lg overflow-hidden">
                                                        <div className="bg-slate-50 p-3 border-b font-bold text-slate-800">{q.title}</div>
                                                        <div className="grid grid-cols-2 divide-x">
                                                            <div className={`p-4 ${canEdit('employee') ? 'bg-blue-50' : 'bg-slate-50 opacity-60'}`}>
                                                                <div className="text-sm font-bold text-blue-800 mb-2">本人評価</div>
                                                                <div className="flex justify-between">{[1,2,3,4,5].map(s => <label key={s}><input type="radio" name={`emp_${q.id}`} value={s} checked={String(formData[`emp_${q.id}`])===String(s)} onChange={handleInputChange} disabled={!canEdit('employee')}/><span className="ml-1 text-xs">{s}</span></label>)}</div>
                                                            </div>
                                                            <div className={`p-4 ${canEdit('manager') ? 'bg-emerald-50' : 'bg-slate-50 opacity-60'}`}>
                                                                <div className="text-sm font-bold text-emerald-800 mb-2">職制評価</div>
                                                                <div className="flex justify-between">{[1,2,3,4,5].map(s => <label key={s}><input type="radio" name={`mgr_${q.id}`} value={s} checked={String(formData[`mgr_${q.id}`])===String(s)} onChange={handleInputChange} disabled={!canEdit('manager')}/><span className="ml-1 text-xs">{s}</span></label>)}</div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                                <div className="flex justify-between items-center mt-8 pt-6 border-t">
                                                    <button onClick={() => saveData({ pgStep: 2 })} className="text-slate-500 hover:text-slate-700 font-medium px-4 py-2">戻る</button>
                                                    {(isAdmin || canEdit('ohp')) && (
                                                        <button onClick={() => saveData({ phase: 4 })} className="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-md flex gap-2">PGを完了する <Check className="w-5 h-5"/></button>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {}
                                {currentPhase === 4 && (
                                    <div className="bg-white p-12 rounded-xl shadow-sm border border-slate-200 text-center animate-fade-in-up">
                                        <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-100 mb-6"><CheckCircle className="w-10 h-10 text-green-600" /></div>
                                        <h2 className="text-2xl font-bold text-slate-800 mb-4">就業支援プログラム / 復帰フロー 完了</h2>
                                        <p className="text-slate-600 mb-8 max-w-lg mx-auto">通常業務への復帰が確認されました。今後のご活躍をお祈りしております。</p>
                                        <button onClick={() => setCurrentView('dashboard')} className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 px-6 rounded-md">ダッシュボードへ戻る</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<HealthSupportPortal />);
    </script>
</body>
</html>
